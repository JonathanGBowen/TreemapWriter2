enter; width:120px;\"><div class=\"repro\" style=\"width:100%; height:54px; display:grid; place-items:center;\"><span class=\"mono\" style=\"font-size:8px; letter-spacing:0.1em; color:#ffe600; border:1px solid rgba(255,230,0,0.4); padding:2px 6px;\">STALE<\u002Fspan><\u002Fdiv><span class=\"kicker\" style=\"font-size:8px;\">StatusBadge<\u002Fspan><span class=\"sm\" style=\"font-size:10px; text-align:center;\">word + colour<\u002Fspan><\u002Fdiv>\n            <div class=\"col gap-8\" style=\"align-items:center; width:120px;\"><div class=\"repro\" style=\"width:100%; height:54px; display:grid; place-items:center; padding:8px;\"><div style=\"display:grid; grid-template-columns:1fr 1fr; gap:2px; width:60px; height:34px;\"><div style=\"background:rgba(0,232,112,0.25); border:1px solid #00e870;\"><\u002Fdiv><div style=\"background:rgba(255,16,96,0.2); border:1px solid #ff1060;\"><\u002Fdiv><div style=\"background:rgba(255,230,0,0.2); border:1px solid #ffe600;\"><\u002Fdiv><div style=\"background:rgba(0,232,245,0.2); border:1px solid #00e8f5;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><span class=\"kicker\" style=\"font-size:8px;\">Treemap tile<\u002Fspan><span class=\"sm\" style=\"font-size:10px; text-align:center;\">fill + border<\u002Fspan><\u002Fdiv>\n            <div class=\"col gap-8\" style=\"align-items:center; width:120px;\"><div class=\"repro\" style=\"width:100%; height:54px; display:grid; place-items:center;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#00e870;box-shadow:0 0 6px #00e870;\"><\u002Fspan><\u002Fdiv><span class=\"kicker\" style=\"font-size:8px;\">Saved-dot<\u002Fspan><span class=\"sm\" style=\"font-size:10px; text-align:center; color:var(--hld-orange);\">a circle! ✕ identity<\u002Fspan><\u002Fdiv>\n            <div class=\"col gap-8\" style=\"align-items:center; width:120px;\"><div class=\"repro\" style=\"width:100%; height:54px; display:flex; align-items:center; padding-left:0;\"><div style=\"width:2px; height:34px; background:#00e8f5; box-shadow:0 0 6px #00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:8px; color:#c5d8e8; margin-left:8px;\">selected row<\u002Fspan><\u002Fdiv><span class=\"kicker\" style=\"font-size:8px;\">Selected-bar<\u002Fspan><span class=\"sm\" style=\"font-size:10px; text-align:center;\">left edge<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"body\" style=\"font-size:12.5px;\">Each is individually well-built. The redundancy is <i>systemic<\u002Fi>: six visual encoders compete to answer \"what state is this?\". A reader scanning for \"what needs me\" must learn all six. <b>Consolidate to one canonical encoder — the Pip<\u002Fb> — and demote the rest to it (the meter becomes one labelled bar; the saved-dot becomes a square).<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- buttons family -->\n      <div class=\"col gap-8\" style=\"flex:1;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-green);\"><\u002Fspan><span class=\"l\">The button family — consistent ✓<\u002Fspan><\u002Fdiv>\n        <div class=\"panel col gap-10\" style=\"padding:16px; border-color:rgba(0,232,112,0.2);\">\n          <div class=\"row wrap gap-8 center\">\n            <button class=\"hld-btn hld-btn-lit\">Generate<\u002Fbutton>\n            <button class=\"hld-btn hld-btn-ghost\">Continue<\u002Fbutton>\n            <button class=\"hld-btn hld-btn-neutral\">Cancel<\u002Fbutton>\n            <button class=\"hld-btn hld-btn-accent\" style=\"--accent:var(--hld-green);\">Sprint<\u002Fbutton>\n            <button class=\"hld-btn hld-btn-lit-magenta\">Discard<\u002Fbutton>\n          <\u002Fdiv>\n          <hr class=\"hld-rule\">\n          <p class=\"sm\">One shell, well-parameterised: <span class=\"mono\">lit<\u002Fspan> (the single action), <span class=\"mono\">ghost<\u002Fspan>, <span class=\"mono\">neutral<\u002Fspan>, <span class=\"mono\">accent<\u002Fspan>. This is the model the <i>status<\u002Fi> layer should follow — and proof the system can do consolidation when it wants to.<\u002Fp>\n          <div class=\"panel panel--deep\" style=\"padding:10px;\">\n            <span class=\"kicker\" style=\"font-size:8px; color:var(--hld-cyan);\">The rule it already states<\u002Fspan>\n            <p class=\"sm\" style=\"margin-top:5px; color:var(--ink-mute2);\">\"<span class=\"mono\">hld-pip<\u002Fspan> = <b>the one<\u002Fb> status vocabulary.\" The system wrote this down. The audit is just asking it to hold the line.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Inventory · Spacing &amp; Components<\u002Fspan>\n      <span>One canonical status encoder · snap spacing to the 9-step grid<\u002Fspan>\n      <span class=\"pageno\">04<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ========================================= P5 · HEURISTICS OVERVIEW = -->\n  <section class=\"page\" id=\"p5\" data-screen-label=\"05 Heuristics — annotated workspace\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Heuristics · Nielsen (1994 / 2020)<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> the scorecard &amp; the primary screen<\u002Fspan>\n      <span>Page 05 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"row between center\" style=\"margin-bottom:12px;\">\n      <div class=\"col gap-8\">\n        <span class=\"eyebrow\">Phase 2 — heuristic walkthrough<\u002Fspan>\n        <h2 class=\"h2\">No catastrophes. Two majors, both about subtraction.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"row gap-8 wrap\" style=\"width:420px; flex:none; justify-content:flex-end;\">\n        <span class=\"sev sev-0\">0 None<\u002Fspan><span class=\"sev sev-1\">1 Cosmetic<\u002Fspan><span class=\"sev sev-2\">2 Minor<\u002Fspan><span class=\"sev sev-3\">3 Major<\u002Fspan><span class=\"sev sev-4\">4 Catastrophic<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"row gap-16\" style=\"align-items:            <div style=\"margin-top:8px; font-size:9.5px; color:#8aa6c4; line-height:1.5;\">Evidence present, but the warrant linking it to the claim is implicit.<\u002Fdiv>\n              <div class=\"row gap-8 center\" style=\"margin-top:10px; font-size:9px; color:#c5d8e8;\"><span class=\"dia y\"><\u002Fspan> Warrant · weak<\u002Fdiv>\n              <div class=\"row gap-8 center\" style=\"margin-top:6px; font-size:9px; color:#c5d8e8;\"><span class=\"dia m\"><\u002Fspan> Counter · missing<\u002Fdiv>\n              <div style=\"margin-top:10px; padding-top:8px; border-top:1px solid var(--seam); font-size:8.5px; color:#6f8cab;\">▸ SUGGESTED MOVES<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- pins -->\n          <div class=\"pin\" style=\"--pc:var(--hld-orange); top:6%; right:20%;\">8<\u002Fdiv>\n          <div class=\"ring\" style=\"--pc:var(--hld-orange); top:4%; right:9%; width:128px; height:26px;\"><\u002Fdiv>\n          <div class=\"pin\" style=\"--pc:var(--hld-orange); top:4%; right:30%;\">6<\u002Fdiv>\n          <div class=\"pin\" style=\"--pc:var(--hld-yellow); bottom:9%; left:6%;\">4<\u002Fdiv>\n          <div class=\"ring\" style=\"--pc:var(--hld-yellow); bottom:6%; left:9px; width:128px; height:30px;\"><\u002Fdiv>\n          <div class=\"pin\" style=\"--pc:var(--hld-yellow); top:46%; right:12%;\">2<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row gap-16\">\n          <div class=\"note\"><div class=\"b\" style=\"--pc:var(--hld-orange);\">6<\u002Fdiv><div class=\"tx\"><b>Eight icon-only tools<\u002Fb>, no labels — recognition fails (H6).<\u002Fdiv><\u002Fdiv>\n          <div class=\"note\"><div class=\"b\" style=\"--pc:var(--hld-orange);\">8<\u002Fdiv><div class=\"tx\"><b>Scanline on two columns<\u002Fb> + glow on every pip = clutter (H8).<\u002Fdiv><\u002Fdiv>\n          <div class=\"note\"><div class=\"b\" style=\"--pc:var(--hld-yellow);\">4<\u002Fdiv><div class=\"tx\"><b>4-diamond meter<\u002Fb> over-encodes one value ld-cyan); padding:12px;\">\n          <span class=\"eyebrow\" style=\"color:var(--hld-cyan); font-size:8px;\">ADHD lens — why this matters most<\u002Fspan>\n          <p class=\"sm\" style=\"margin-top:6px; color:var(--ink-mute2);\">Constant low-level motion and glow tax exactly the attention system this tool exists to support. <b class=\"cyan\">Calm is not cosmetic here — it is the feature.<\u002Fb> The fix is also the cheapest: turn layers off by default, let glow mean \"live.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- before / after -->\n      <div class=\"col grow gap-8\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-green);\"><\u002Fspan><span class=\"l\">Before → after · same screen, restraint enforced<\u002Fspan><\u002Fdiv>\n        <div class=\"ba\" style=\"grid-template-rows:1fr;\">\n          <!-- BEFORE -->\n          <div style=\"padding:0; overflow:hidden;\">\n            <span class=\"tag bf\">Now<\u002Fspan>\n            <div class=\"repro scan\" style=\"height:300px; padding:12px;\">\n              <div class=\"row between center\" style=\"margin-bottom:10px;\">\n                <span class=\"mono\" style=\"font-size:8px; letter-spacing:0.14em; color:#6f8cab;\">RESULTS<\u002Fspan>\n                <div class=\"row gap-8\">\n                  <button class=\"hld-btn hld-btn-lit\" style=\"font-size:8px; padding:4px 8px;\">Generate<\u002Fbutton>\n                  <button class=\"hld-btn hld-btn-lit-magenta\" style=\"font-size:8px; padding:4px 8px;\">Discard<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-wrap:wrap; gap:9px; margin-bottom:12px;\">\n                <span class=\"dia c\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia m\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia g\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia y\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia p\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia c\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia m\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia g\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia y\" style=\"width:9px;height:9px;\"><\u002Fspan><span class=\"dia c\" style=\"width:9px;height:9px;\"><\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"border:1px solid rgba(0,232,245,0.4); box-shadow:0 0 10px rgba(0,232,245,0.15); padding:8px; font-size:10px; color:#c5d8e8; margin-bottom:8px;\">A panel glowing for no reason.<\u002Fdiv>\n              <div style=\"border:1px solid rgba(255,16,96,0.4); box-shadow:0 0 10px rgba(255,16,96,0.15); padding:8px; font-size:10px; color:#c5d8e8;\">Another, competing for the same eye.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- AFTER -->\n          <div style=\"padding:0; overflow:hidden; background:#0a121c;\">\n            <span class=\"tag af\">Proposed<\u002Fspan>\n            <div style=\"height:300px; padding:12px; background:#0a121c;\">\n              <div class=\"row between center\" style=\"margin-bottom:10px;\">\n                <span class=\"mono\" style=\"font-size:8px; letter-spacing:0.14em; color:#6f8cab;\">RESULTS<\u002Fspan>\n                <button class=\"hld-btn hld-btn-lit\" style=\"font-size:8px; padding:4px 8px;\">Generate<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-wrap:wrap; gap:9px; margin-bottom:12px;\">\n                <span style=\"width:7px;height:7px;transform:rotate(45deg);background:#3d5570;\"><\u002Fspan><span style=\"width:7px;height:7px;transform:rotate(45deg);background:#3d5570;\"><\u002Fspan><span class=\"dia m\" style=\"width:8px;height:8px;\"><\u002Fspan><span style=\"width:7px;height:7px;transform:rotate(45deg);background:#3d5570;\"><\u002Fspan><span style=\"width:7px;height:7px;transform:rotate(45deg);background:#3d5570;\"><\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"border:1px solid #172335; padding:8px; font-size:10px; color:#c5d8e8; margin-bottom:8px;\">Panels are quiet by default —<\u002Fdiv>\n              <div style=\"border:1px solid #172335; padding:8px; font-size:10px; color:#8aa6c4;\">one lit action draws the eye; one magenta pip means \"needs you.\"<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row gap-16\" style=\"margin-top:2px;\">\n          <div class=\"note\"><div class=\"b\" style=\"--pc:var(--hld-orange);\">−<\u002Fdiv><div class=\"tx\">Wash, grid, scanline <b>off by default<\u002Fb>; opt-in per chrome surface only.<\u002Fdiv><\u002Fdiv>\n          <div class=\"note\"><div class=\"b\" style=\"--pc:var(--hld-green);\">+<\u002Fdiv><div class=\"tx\">Glow reserved for the <b>one live action<\u002Fb> and the moment of consequence.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Heuristic 8 · Aesthetic &amp; minimalist<\u002Fspan>\n      <span>\"Glow = this is alive\" — the system's own rule, re-enforced<\u002Fspan>\n      <span class=\"pageno\">06<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================================== P7 · H6 RECOGNITION (MAJOR) == -->\n  <section class=\"page\" id=\"p7\" data-screen-label=\"07 Heuristic — recognition vs recall\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Heuristic 6 · Recognition &gt; recall<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> name the tools<\u002Fspan>\n      <span>Page 07 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"row between center\" style=\"margin-bottom:14px;\">\n      <div class=\"col gap-8\">\n        <div class=\"row gap-12 center\"><span class=\"eyebrow\">Major finding · H6<\u002Fspan><span class=\"sev sev-3\">3 · Major<\u002Fspan><\u002Fdiv>\n        <h2 class=\"h2\">Eight glyphs the user has to memorise.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"body\" style=\"width:400px; flex:none;\">The toolbar is eight bare unicode glyphs. Their meaning lives only in hover tooltips and the user's memory — invisible to touch, slow for the keyboard, and a working-memory tax on exactly the readers this tool serves. Recognition beats recall: show the names.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"col gap-8\" style=\"margin-bottom:14px;\">\n      <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-orange);\"><\u002Fspan><span class=\"l\">What the user actually sees — can you name these without hovering?<\u002Fspan><\u002Fdiv>\n      <div class=\"repro\" style=\"padding:18px; display:flex; gap:26px; justify-content:center; align-items:center;\">\n        <div class=\"col center gap-8\"><span class=\"mono\" style=\"font-size:20px; color:#6f8cab;\">⌖<\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:var(--hld-orange);\">?<\u002Fspan><\u002Fdiv>\n        <div class=\"col center gap-8\"><span class=\"mono\" style=\"font-size:20px; color:#6f8cab;\">⊞<\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:var(--hld-orange);\">?<\u002Fspan><\u002Fdiv>\n        <div class=\"col center gap-8\"><span class=\"mono\" style=\"font-size:20px; color:#6f8cab;\">◫<\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:var(--hld-orange);\">?<\u002Fspan><\u002Fdiv>\n        <div class=\"col center gap-8\"><span class=\"mono\" style=\"font-size:20px; color:#6f8cab;\">❏<\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:var(--hld-orange);\">?<\u002Fspan><\u002Fdiv>\n        <div class=\"col center gap-8\"><span class=\"mono\" style=\"font-size:20px; color:#6f8cab;\">⎘<\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:var(--hld-orange);\">?<\u002Fspan><\u002Fdiv>\n        <div class=\"col center gap-8\"><span class=\"mono\" style=\"font-size:20px; color:#6f8cab;\">⟲<\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:var(--hld-orange);\">?<\u002Fspan><\u002Fdiv>\n        <div class=\"col center gap-8\"><span class=\"mono\" style=\"font-size:20px; color:#6f8cab;\">◷<\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:var(--hld-orange);\">?<\u002Fspan><\u002Fdiv>\n        <div class=\"col center gap-8\"><span class=\"mono\" style=\"font-size:20px; color:#6f8cab;\">✦<\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:var(--hld-orange);\">?<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"row gap-16\" style=\"align-items:stretch;\">\n      <div class=\"col grow gap-8\" style=\"flex:1.4;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-green);\"><\u002Fspan><span class=\"l\">Before → after<\u002Fspan><\u002Fdiv>\n        <div class=\"ba\">\n          <div style=\"padding:16px;\">\n            <span class=\"tag bf\">Now<\u002Fspan>\n            <div class=\"mono\" style=\"font-size:8px; letter-spacing:0.14em; color:#6f8cab; margin-bottom:12px;\">ICON-ONLY<\u002Fdiv>\n            <div class=\"row gap-16 center mono\" style=\"font-size:16px; color:#6f8cab;\"><span>⌖<\u002Fspan><span>⊞<\u002Fspan><span>◫<\u002Fspan><span>⎘<\u002Fspan><span>⟲<\u002Fspan><span>✦<\u002Fspan><\u002Fdiv>\n            <p class=\"sm\" style=\"margin-top:14px;\">Meaning hidden until hover. No label, no shortcut shown, target ~25px.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding:16px; background:#0a121c;\">\n            <span class=\"tag af\">Proposed<\u002Fspan>\n            <div class=\"mono\" style=\"font-size:8px; letter-spacing:0.14em; color:#6f8cab; margin-bottom:12px;\">ICON + LABEL<\u002Fdiv>\n            <div class=\"row gap-12 wrap\">\n              <div class=\"col center gap-4\" style=\"width:54px;\"><span class=\"mono\" style=\"font-size:15px; color:#c5d8e8;\">⌖<\u002Fspan><span class=\"mono\" style=\"font-size:7px; letter-spacing:0.06em; color:#8aa6c4;\">FOCUS<\u002Fspan><\u002Fdiv>\n              <div class=\"col center gap-4\" style=\"width:54px;\"><span class=\"mono\" style=\"font-size:15px; color:#c5d8e8;\">⊞<\u002Fspan><span class=\"mono\" style=\"font-size:7px; letter-spacing:0.06em; color:#8aa6c4;\">MAP<\u002Fspan><\u002Fdiv>\n              <div class=\"col center gap-4\" style=\"width:54px;\"><span class=\"mono\" style=\"font-size:15px; color:#c5d8e8;\">◫<\u002Fspan><span class=\"mono\" style=\"font-size:7px; letter-spacing:0.06em; color:#8aa6c4;\">SPLIT<\u002Fspan><\u002Fdiv>\n              <div class=\"col center gap-4\" style=\"width:54px;\"><span class=\"mono\" style=\"font-size:15px; color:#c5d8e8;\">⎘<\u002Fspan><span class=\"mono\" style=\"font-size:7px; letter-spacing:0.06em; color:#8aa6c4;\">COPY<\u002Fspan><\u002Fdiv>\n              <div class=\"col center gap-4\" style=\"width:54px;\"><span class=\"mono\" style=\"font-size:15px; color:#c5d8e8;\">⟲<\u002Fspan><span class=\"mono\" style=\"font-size:7px; letter-spacing:0.06em; color:#8aa6c4;\">UNDO<\u002Fspan><\u002Fdiv>\n              <div class=\"col center gap-4\" style=\"width:54px;\"><span class=\"mono\" style=\"font-size:15px; color:#c5d8e8;\">✦<\u002Fspan><span class=\"mono\" style=\"font-size:7px; letter-spacing:0.06em; color:#8aa6c4;\">ASSIST<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <p class=\"sm\" style=\"margin-top:14px;\">Names visible; shortcut on the tooltip; 44px target. No memory required.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"col gap-8\" style=\"flex:1;\">\n        <div class=\"panel panel--deep brk\" style=\"--br:var(--hld-cyan); padding:14px;\">\n          <span class=\"eyebrow\" style=\"color:var(--hld-cyan); font-size:8px;\">Cheaper middle path<\u002Fspan>\n          <p class=\"sm\" style=\"margin-top:6px;\">If the rail must stay narrow, label on <b>first run<\u002Fb> and collapse to icons once learned — or reveal labels on a single <span class=\"mono\">⌥<\u002Fspan> hold. Either keeps the spare look while removing the recall tax.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"panel panel--deep\" style=\"padding:14px;\">\n          <span class=\"eyebrow eyebrow--mute\" style=\"font-size:8px;\">Also under H6<\u002Fspan>\n          <ul style=\"margin:8px 0 0; padding-left:15px; color:var(--ink-mute2); font-size:11.5px; line-height:1.6;\">\n            <li>The sidebar <b>name field<\u002Fb> reads as a label until clicked — no edit affordance.<\u002Fli>\n            <li>Treemap tiles look like a chart but are clickable navigation (see Page 11).<\u002Fli>\n            <li>Keyboard shortcuts exist (⌘K) but aren't surfaced beside their actions.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Heuristic 6 · Recognition over recall<\u002Fspan>\n      <span>Labels are an accessibility &amp; ADHD win, not visual debt<\u002Fspan>\n      <span class=\"pageno\">07<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================================= P8 · MODERATES + STRENGTHS ======= -->\n  <section class=\"page\" id=\"p8\" data-screen-label=\"08 Heuristic — moderates &amp; strengths\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Heuristics · the rest<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> four moderates · four real strengths<\u002Fspan>\n      <span>Page 08 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"col gap-8\" style=\"margin-bottom:14px;\">\n      <span class=\"eyebrow\">Phase 2 — minor &amp; cosmetic findings, and credit where due<\u002Fspan>\n      <h2 class=\"h2\">Honest scoring cuts both ways: most of the rest is fine.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-yellow);\"><\u002Fspan><span class=\"l\">Moderate findings — fix on the consistency pass<\u002Fspan><\u002Fdiv>\n    <div class=\"row gap-12\" style=\"margin:10px 0 18px; align-items:stretch;\">\n      <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n        <div class=\"row between center\"><span class=\"kicker\" style=\"font-size:9px;\">H2 · Match real world<\u002Fspan><span class=\"sev sev-2\">2<\u002Fspan><\u002Fdiv>\n        <p class=\"sm\" style=\"flex:1;\">Domain words (spec, move, warrant) fit the writer well — but ultra-terse <span class=\"mono\">MONO CAPS<\u002Fspan> + bare glyphs raise decode cost.<\u002Fp>\n        <div class=\"panel panel--deep\" style=\"padding:7px 9px;\"><span class=\"sm\" style=\"color:var(--hld-green); font-size:11px;\">→ Sentence-case key labels; reserve caps for true eyebrows.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n        <div class=\"row between center\"><span class=\"kicker\" style=\"font-size:9px;\">H3 · Control &amp; freedom<\u002Fspan><span class=\"sev sev-3\">2–3<\u002Fspan><\u002Fdiv>\n        <p class=\"sm\" style=\"flex:1;\">In-flight <b>Generate / Run<\u002Fb> show no cancel; destructive <b class=\"mag\">Discard<\u002Fb> and section-delete have no confirm; undo isn't surfaced.<\u002Fp>\n        <div class=\"panel panel--deep\" style=\"padding:7px 9px;\"><span class=\"sm\" style=\"color:var(--hld-green); font-size:11px;\">→ Cancel on running states; confirm destructive; visible undo.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n        <div class=\"row between center\"><span class=\"kicker\" style=\"font-size:9px;\">H4 · Consistency<\u002Fspan><span class=\"sev sev-2\">2<\u002Fspan><\u002Fdiv>\n        <p class=\"sm\" style=\"flex:1;\">The Phase 1 drift surfaces here: two cyans, five warms, off-grid spacing, and a <b class=\"org\">round saved-dot<\u002Fb> against a square identity.<\u002Fp>\n        <div class=\"panel panel--deep\" style=\"padding:7px 9px;\"><span class=\"sm\" style=\"color:var(--hld-green); font-size:11px;\">→ Enforce tokens; the dot becomes a pip.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n        <div class=\"row between center\"><span class=\"kicker\" style=\"font-size:9px;\">H5 · Error prevention<\u002Fspan><span class=\"sev sev-1\">1–2<\u002Fspan><\u002Fdiv>\n        <p class=\"sm\" style=\"flex:1;\">Generate is correctly disabled mid-run ✓ — but destructive actions are unguarded and a few inputs accept before validating.<\u002Fp>\n        <div class=\"panel panel--deep\" style=\"padding:7px 9px;\"><span class=\"sm\" style=\"color:var(--hld-green); font-size:11px;\">→ Guard destructive; validate before enabling submit.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-green);\"><\u002Fspan><span class=\"l\">Genuine strengths — preserve these through any refactor<\u002Fspan><\u002Fdiv>\n    <div class=\"row gap-12\" style=\"margin-top:10px; align-items:stretch;\">\n      <div class=\"panel grow col gap-8\" style=\"padding:14px; border-color:rgba(0,232,112,0.22);\">\n        <div class=\"row between center\"><span class=\"kicker\" style=\"font-size:9px; color:var(--hld-green);\">H1 · Status<\u002Fspan><span class=\"sev sev-0\">0–1<\u002Fspan><\u002Fdiv>\n        <div class=\"row gap-8 center\" style=\"margin:2px 0;\"><span class=\"dia g\"><\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:#8aa6c4;\">SAVED · 12s<\u002Fspan><span class=\"dia p\"><\u002Fspan><span class=\"mono\" style=\"font-size:9px; color:#8aa6c4;\">RUNNING<\u002Fspan><\u002Fdiv>\n        <p class=\"sm\">Save state, run pulses, readiness and badges keep the user oriented.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"panel grow col gap-8\" style=\"padding:14px; border-color:rgba(0,232,112,0.22);\">\n        <div class=\"row between center\"><span class=\"kicker\" style=\"font-size:9px; color:var(--hld-green);\">H7 · Flexibility<\u002Fspan><span class=\"sev sev-0\">0–1<\u002Fspan><\u002Fdiv>\n        <div class=\"row gap-8 center\" style=\"margin:2px 0;\"><span class=\"mono\" style=\"font-size:8px; color:#00e8f5; border:1px solid rgba(0,232,245,0.4); padding:2px 5px;\">⌘K<\u002Fspan><span class=\"mono\" style=\"font-size:8px; color:#8aa6c4;\">SPRINT · SESSION<\u002Fspan><\u002Fdiv>\n        <p class=\"sm\">A command palette, Continue, and writing modes serve the daily power user.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"panel grow col gap-8\" style=\"padding:14px; border-color:rgba(0,232,112,0.22);\">\n        <div class=\"row between center\"><span class=\"kicker\" style=\"font-size:9px; color:var(--hld-green);\">H9 · Recovery<\u002Fspan><span class=\"sev sev-0\">0–1<\u002Fspan><\u002Fdiv>\n        <p class=\"sm\" style=\"margin-top:2px;\">The diagnostic doesn't just flag — it locates the problem, <b>diagnoses<\u002Fb> it, and <b>suggests the move<\u002Fb>. Exemplary constructive error handling.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"panel grow col gap-8\" style=\"padding:14px; border-color:rgba(0,232,112,0.22);\">\n        <div class=\"row between center\"><span class=\"kicker\" style=\"font-size:9px; color:var(--hld-green);\">H10 · Help<\u002Fspan><span class=\"sev sev-0\">0–1<\u002Fspan><\u002Fdiv>\n        <p class=\"sm\" style=\"margin-top:2px;\">Empty states carry real instructions instead of blank voids — onboarding is built into the surface, not bolted on.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"panel panel--deep\" style=\"margin-top:16px; padding:12px 16px;\">\n      <p class=\"body\" style=\"margin:0; font-size:12.5px;\"><b class=\"cyan\">The pattern across all ten:<\u002Fb> the system's logic and feedback are strong; its <i>visual restraint<\u002Fi> is the soft spot. That's a polish problem, not a structural one — which is exactly why the verdict is \"needs polish,\" not \"rethink.\"<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Heuristics · Moderates &amp; strengths<\u002Fspan>\n      <span>Strengths are load-bearing — don't lose them in a denoise pass<\u002Fspan>\n      <span class=\"pageno\">08<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================================== P9 · A11Y CONTRAST + TARGETS == -->\n  <section class=\"page\" id=\"p9\" data-screen-label=\"09 Accessibility — contrast &amp; targets\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Accessibility · WCAG 2.2 AA<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> contrast · target size · focus<\u002Fspan>\n      <span>Page 09 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"col gap-8\" style=\"margin-bottom:14px;\">\n      <span class=\"eyebrow\">Phase 3a/3b — contrast &amp; interactive elements<\u002Fspan>\n      <h2 class=\"h2\">Reading text is excellent. The edges and the dim labels are where it slips.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"row gap-16\" style=\"align-items:flex-start;\">\n      <!-- contrast -->\n      <div class=\"col grow gap-8\" style=\"flex:1.3;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-magenta);\"><\u002Fspan><span class=\"l\">Contrast — failing pairs (computed on the real tokens)<\u002Fspan><\u002Fdiv>\n        <div class=\"row gap-10 wrap\">\n          <div class=\"cpair\" style=\"width:calc(50% - 5px);\">\n            <div class=\"demo\" style=\"background:#05090d; color:#3d5570;\">Decorative grey used as text<\u002Fdiv>\n            <div class=\"info\"><span style=\"color:#6f8cab;\">#3d5570 on canvas<\u002Fspan><span><span class=\"ratio fail\">2.6:1<\u002Fspan> <span class=\"badge-fail\">FAIL<\u002Fspan> <span style=\"color:#6f8cab;\">need 4.5<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"info\" style=\"border-top:0;\"><span style=\"color:#00e870;\">→ #8aa6c4<\u002Fspan><span class=\"ratio pass\">7.9:1<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cpair\" style=\"width:calc(50% - 5px);\">\n            <div class=\"demo\" style=\"background:#111d2b; color:#ff1060;\">Magenta as small body text<\u002Fdiv>\n            <div class=\"info\"><span style=\"color:#6f8cab;\">#ff1060 on surface-2<\u002Fspan><span><span class=\"ratio fail\">4.4:1<\u002Fspan> <span class=\"badge-fail\">FAIL<\u002Fspan> <span style=\"color:#6f8cab;\">need 4.5<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"info\" style=\"border-top:0;\"><span style=\"color:#00e870;\">→ bold / ≥18px or pip only<\u002Fspan><span class=\"ratio pass\">3:1 lg<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cpair\" style=\"width:calc(50% - 5px);\">\n            <div class=\"demo\" style=\"background:#0c1520; color:rgba(255,255,255,0.5);\">Dimmed sibling-tile label<\u002Fdiv>\n            <div class=\"info\"><span style=\"color:#6f8cab;\">white 50% on tile<\u002Fspan><span><span class=\"ratio fail\">~3.0:1<\u002Fspan> <span class=\"badge-fail\">FAIL<\u002Fspan> <span style=\"color:#6f8cab;\">need 4.5<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"info\" style=\"border-top:0;\"><span style=\"color:#00e870;\">→ opacity .72 / muted-text<\u002Fspan><span class=\"ratio pass\">4.8:1<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cpair\" style=\"width:calc(50% - 5px);\">\n            <div class=\"demo\" style=\"background:#05090d; color:#c5d8e8; position:relative;\"><span style=\"border:1px solid #172335; padding:2px 6px;\">Hairline as a UI edge<\u002Fspan><\u002Fdiv>\n            <div class=\"info\"><span style=\"color:#6f8cab;\">#172335 vs canvas<\u002Fspan><span><span class=\"ratio fail\">1.3:1<\u002Fspan> <span class=\"badge-fail\">FAIL<\u002Fspan> <span style=\"color:#6f8cab;\">need 3 (non-text)<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"info\" style=\"border-top:0;\"><span style=\"color:#00e870;\">→ rely on focus ring / hover<\u002Fspan><span class=\"ratio pass\">cyan 13:1<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel panel--deep\" style=\"padding:10px 12px;\">\n          <p class=\"sm\" style=\"margin:0;\"><b class=\"grn\">Passing well:<\u002Fb> body text #c5d8e8 reads at <b>~13.7:1<\u002Fb>; cyan, green, yellow accents all clear 12:1 on canvas. The reading surface is genuinely strong — the failures are narrow and specific.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- targets + focus -->\n      <div class=\"col gap-8\" style=\"flex:1;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-yellow);\"><\u002Fspan><span class=\"l\">Target size &amp; focus<\u002Fspan><\u002Fdiv>\n        <div class=\"panel col gap-10\" style=\"padding:14px;\">\n          <div class=\"row gap-12 center\">\n            <div style=\"width:28px; height:28px; border:1px dashed var(--hld-yellow); flex:none; display:grid; place-items:center;\"><span class=\"mono\" style=\"font-size:7px; color:var(--hld-yellow);\">28<\u002Fspan><\u002Fdiv>\n            <div style=\"width:44px; height:44px; border:1px solid var(--hld-green); flex:none; display:grid; place-items:center;\"><span class=\"mono\" style=\"font-size:7px; color:var(--hld-green);\">44<\u002Fspan><\u002Fdiv>\n            <p class=\"sm\" style=\"margin:0;\"><span class=\"mono\">--hit-target: 28px<\u002Fspan> clears WCAG 2.5.8 (24px) but misses the <b>44px<\u002Fb> comfort floor. Glyph tools ~25px and chevrons ~10–12px sit <b class=\"org\">at or under<\u002Fb> it.<\u002Fp>\n          <\u002Fdiv>\n          <hr class=\"hld-rule\">\n          <div class=\"col gap-6\">\n            <span class=\"kicker\" style=\"font-size:8px; color:var(--hld-magenta);\">Focus visibility — the real gap<\u002Fspan>\n            <p class=\"sm\" style=\"margin:0;\">Inputs have a focus ring ✓. Buttons, tools and rows define <span class=\"mono\">:hover<\u002Fspan> but no <span class=\"mono\">:focus-visible<\u002Fspan> — keyboard focus is likely <b class=\"mag\">invisible<\u002Fb>. The app even sets <span class=\"mono\">outline:none<\u002Fspan> on the editor.<\u002Fp>\n            <div class=\"row gap-8\" style=\"margin-top:4px;\">\n              <button class=\"hld-btn hld-btn-ghost\" style=\"font-size:8px;\">no focus ring<\u002Fbutton>\n              <button class=\"hld-btn hld-btn-ghost\" style=\"font-size:8px; outline:2px solid var(--hld-cyan); outline-offset:2px; color:var(--hld-cyan); border-color:rgba(0,232,245,0.4);\">focus-visible ✓<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"panel panel--deep\" style=\"padding:8px 10px;\"><span class=\"sm\" style=\"color:var(--hld-green); font-size:11px;\">→ One <span class=\"mono\">:focus-visible<\u002Fspan> cyan ring (13:1) on every interactive; raise min target to 44px.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Accessibility · Contrast &amp; targets<\u002Fspan>\n      <span>Ratios computed from token hex — confirm on the live build &amp; real tile colours<\u002Fspan>\n      <span class=\"pageno\">09<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================================== P10 · A11Y HIERARCHY + SEMANTICS -->\n  <section class=\"page\" id=\"p10\" data-screen-label=\"10 Accessibility — hierarchy &amp; semantics\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Accessibility · structure<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> heading outline · interactive semantics<\u002Fspan>\n      <span>Page 10 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"col gap-8\" style=\"margin-bottom:14px;\">\n      <span class=\"eyebrow\">Phase 3c — the semantic skeleton<\u002Fspan>\n      <h2 class=\"h2\">The document looks structured. To a screen reader, it's flat.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"row gap-16\" style=\"align-items:flex-start;\">\n      <!-- outline current vs proposed -->\n      <div class=\"col grow gap-8\" style=\"flex:1.25;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-magenta);\"><\u002Fspan><span class=\"l\">Heading outline — what assistive tech receives<\u002Fspan><\u002Fdiv>\n        <div class=\"ba\">\n          <div style=\"padding:16px;\">\n            <span class=\"tag bf\">Now<\u002Fspan>\n            <div class=\"mono\" style=\"font-size:8px; letter-spacing:0.14em; color:#6f8cab; margin-bottom:10px;\">COLOUR-CODED &lt;div&gt;s<\u002Fdiv>\n            <div class=\"outline\">\n              <div><span style=\"color:#ff1060;\">▪<\u002Fspan> <span class=\"tag\">div.h1<\u002Fspan> Results<\u002Fdiv>\n              <div><span style=\"color:#00e8f5;\">▪<\u002Fspan> <span class=\"tag\">div.h2<\u002Fspan> Primary outcome<\u002Fdiv>\n              <div><span style=\"color:#ffe600;\">▪<\u002Fspan> <span class=\"tag\">div.h3<\u002Fspan> Secondary<\u002Fdiv>\n              <div><span style=\"color:#00e870;\">▪<\u002Fspan> <span class=\"tag\">div.h4<\u002Fspan> Limitations<\u002Fdiv>\n              <div style=\"margin-top:10px; color:var(--hld-magenta);\">⚠ outline depth = <b>0<\u002Fb><\u002Fdiv>\n              <div class=\"sm\" style=\"color:#6f8cab; margin-top:4px;\">No &lt;h1–h6&gt; — hierarchy is colour, not structure. SR \"headings\" navigation finds nothing.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px; background:#0a121c;\">\n            <span class=\"tag af\">Proposed<\u002Fspan>\n            <div class=\"mono\" style=\"font-size:8px; letter-spacing:0.14em; color:#6f8cab; margin-bottom:10px;\">SEMANTIC + COLOUR<\u002Fdiv>\n            <div class=\"outline\">\n              <div><span class=\"lv\">h1<\u002Fspan> Results<\u002Fdiv>\n              <div style=\"padding-left:16px;\"><span class=\"lv\">h2<\u002Fspan> Primary outcome<\u002Fdiv>\n              <div style=\"padding-left:32px;\"><span class=\"lv\">h3<\u002Fspan> Secondary<\u002Fdiv>\n              <div style=\"padding-left:32px;\"><span class=\"lv\">h3<\u002Fspan> Limitations<\u002Fdiv>\n              <div style=\"margin-top:10px; color:var(--hld-green);\">✓ real, nested outline<\u002Fdiv>\n              <div class=\"sm\" style=\"color:#6f8cab; margin-top:4px;\">Keep the rainbow as CSS on top of true heading tags — colour <i>and<\u002Fi> structure.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel panel--deep\" style=\"padding:9px 12px;\"><p class=\"sm\" style=\"margin:0;\"><span class=\"mono\" style=\"color:var(--hld-cyan);\">Caveat:<\u002Fspan> reconstructed from kit code; the live editor uses CodeMirror — confirm whether it emits semantic headings. Credit where due: the <b>treemap ships an <span class=\"mono\">.sr-only<\u002Fspan> text alternative<\u002Fb> ✓.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- interactive semantics -->\n      <div class=\"col gap-8\" style=\"flex:1;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-yellow);\"><\u002Fspan><span class=\"l\">Interactive semantics (3b)<\u002Fspan><\u002Fdiv>\n        <div class=\"panel col gap-9\" style=\"padding:14px;\">\n          <div class=\"row gap-10 center\">\n            <span class=\"sev sev-3\" style=\"flex:none;\">3<\u002Fspan>\n            <p class=\"sm\" style=\"margin:0;\"><b>Treemap tiles &amp; rows<\u002Fb> are clickable but look like a chart — likely <span class=\"mono\">div<\u002Fspan> click handlers. Need <span class=\"mono\">role=\"button\"<\u002Fspan>, Tab order, Enter/Space.<\u002Fp>\n          <\u002Fdiv>\n          <hr class=\"hld-rule\">\n          <div class=\"row gap-10 center\">\n            <span class=\"sev sev-2\" style=\"flex:none;\">2<\u002Fspan>\n            <p class=\"sm\" style=\"margin:0;\"><b>Sidebar name<\u002Fb> looks like a label, behaves like an input — no edit affordance until clicked.<\u002Fp>\n          <\u002Fdiv>\n          <hr class=\"hld-rule\">\n          <div class=\"row gap-10 center\">\n            <span class=\"sev sev-2\" style=\"flex:none;\">2<\u002Fspan>\n            <p class=\"sm\" style=\"margin:0;\"><b>Pips carry meaning<\u002Fb> (state) but expose no text equivalent — colour is the only channel. Pair each with a label or <span class=\"mono\">aria-label<\u002Fspan>.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"panel panel--deep\" style=\"padding:8px 10px; margin-top:2px;\"><span class=\"sm\" style=\"color:var(--hld-green); font-size:11px;\">→ Semantic elements + visible focus turn the whole surface keyboard- and SR-navigable in one pass.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Accessibility · Hierarchy &amp; semantics<\u002Fspan>\n      <span>Colour must never be the only carrier of state or structure<\u002Fspan>\n      <span class=\"pageno\">10<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================================== P11 · NORMAN COHERENCE ======== -->\n  <section class=\"page\" id=\"p11\" data-screen-label=\"11 Design coherence — Norman\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Coherence · Norman (1988 / 2013)<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> affordance · signifier · feedback · model<\u002Fspan>\n      <span>Page 11 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"row between center\" style=\"margin-bottom:14px;\">\n      <div class=\"col gap-8\">\n        <span class=\"eyebrow\">Phase 4 — design coherence<\u002Fspan>\n        <h2 class=\"h2\">A strong conceptual model, under-signified at the controls.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"body\" style=\"width:400px; flex:none;\">Norman's shift from Gibson was from real affordances to <i>perceived<\u002Fi> ones: an element can be interactive (the affordance exists) yet fail to say so (the signifier is missing). That's the pattern here — the capability is built; the surface often doesn't announce it.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"row gap-16\" style=\"align-items:flex-start;\">\n      <!-- affordance / signifier -->\n      <div class=\"col gap-8\" style=\"flex:1.15;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-yellow);\"><\u002Fspan><span class=\"l\">Affordance vs signifier<\u002Fspan><\u002Fdiv>\n        <div class=\"panel col gap-9\" style=\"padding:13px;\">\n          <div class=\"col gap-3\">\n            <span class=\"kicker\" style=\"font-size:8px; color:var(--hld-orange);\">Affords, doesn't signal<\u002Fspan>\n            <p class=\"sm\" style=\"margin:0;\">Treemap tiles &amp; the sidebar name are interactive but read as a chart and a static label — no cursor, weight, or hover hint until touched.<\u002Fp>\n          <\u002Fdiv>\n          <hr class=\"hld-rule\">\n          <div class=\"col gap-3\">\n            <span class=\"kicker\" style=\"font-size:8px; color:var(--hld-yellow);\">Signals, doesn't afford<\u002Fspan>\n            <p class=\"sm\" style=\"margin:0;\">Bracketed focal frames and glowing borders <i>look<\u002Fi> actionable but are decoration — they spend \"click me\" signal on nothing.<\u002Fp>\n          <\u002Fdiv>\n          <hr class=\"hld-rule\">\n          <div class=\"col gap-3\">\n            <span class=\"kicker\" style=\"font-size:8px; color:var(--hld-magenta);\">Ambiguous<\u002Fspan>\n            <p class=\"sm\" style=\"margin:0;\">Is a pip a status or a control? Some open captions on click; most don't. One shape, two jobs, no tell.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- feedback -->\n      <div class=\"col gap-8\" style=\"flex:1;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-green);\"><\u002Fspan><span class=\"l\">Feedback<\u002Fspan><\u002Fdiv>\n        <div class=\"panel col gap-8\" style=\"padding:13px; border-color:rgba(0,232,112,0.2);\">\n          <p class=\"sm\" style=\"margin:0; color:var(--ink-mute2);\"><b class=\"grn\">Strong where it counts.<\u002Fb> The system follows its own \"juice at the moment of consequence\" rule:<\u002Fp>\n          <div class=\"row gap-8 center\"><span class=\"dia g\"><\u002Fspan><span class=\"sm\" style=\"margin:0;\">Save → \"SAVED · 12s ago\"<\u002Fspan><\u002Fdiv>\n          <div class=\"row gap-8 center\"><span class=\"dia p\"><\u002Fspan><span class=\"sm\" style=\"margin:0;\">Run → pulsing diamond<\u002Fspan><\u002Fdiv>\n          <div class=\"row gap-8 center\"><span class=\"dia c\"><\u002Fspan><span class=\"sm\" style=\"margin:0;\">Arrive → one-shot line flash<\u002Fspan><\u002Fdiv>\n          <hr class=\"hld-rule\">\n          <p class=\"sm\" style=\"margin:0;\"><b class=\"org\">Gaps:<\u002Fb> destructive actions complete with no confirm or echo; an AI call that errors needs a non-silent, in-context failure state (see H9).<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- conceptual model -->\n      <div class=\"col gap-8\" style=\"flex:1.1;\">\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-cyan);\"><\u002Fspan><span class=\"l\">Conceptual model — the best idea<\u002Fspan><\u002Fdiv>\n        <div class=\"panel brk col gap-8\" style=\"--br:var(--hld-cyan); padding:13px;\">\n          <div class=\"repro\" style=\"height:96px; display:grid; place-items:center; padding:10px;\">\n            <div style=\"display:grid; grid-template-columns:1.6fr 1fr; grid-template-rows:1fr 1fr; gap:3px; width:150px; height:74px;\">\n              <div style=\"background:rgba(0,232,245,0.12); border:1px solid rgba(0,232,245,0.5); grid-row:span 2;\"><\u002Fdiv>\n              <div style=\"background:rgba(0,232,112,0.12); border:1px solid rgba(0,232,112,0.4);\"><\u002Fdiv>\n              <div style=\"background:rgba(255,230,0,0.1); border:1px solid rgba(255,230,0,0.35);\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"sm\" style=\"margin:0;\"><b class=\"cyan\">Treemap-as-document-shape<\u002Fb> + part-in-whole rail + spec/moves tells one clear story: <i>structure, not summary.<\u002Fi> A user can look at it and understand what the tool is <i>for<\u002Fi>.<\u002Fp>\n          <div class=\"panel panel--deep\" style=\"padding:8px 10px;\"><span class=\"sm\" style=\"font-size:11px;\">The model is sound. <b class=\"cyan\">Noise is what obscures it.<\u002Fb> Denoise (Page 6) and this idea finally reads at a glance.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"panel panel--deep\" style=\"margin-top:16px; padding:12px 16px;\">\n      <p class=\"body\" style=\"margin:0; font-size:12.5px;\"><b class=\"cyan\">Coherence verdict:<\u002Fb> the mental model is the asset; the controls just need to <i>say what they do<\u002Fi>. Add signifiers (cursor, hover, label, focus), confirm/echo destructive actions, and let the strong model breathe. No re-conception required — only clearer signals.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Design coherence · Norman<\u002Fspan>\n      <span>Perceived affordances: build the signifier, not just the capability<\u002Fspan>\n      <span class=\"pageno\">11<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================================== P12 · ROADMAP ================= -->\n  <section class=\"page\" id=\"p12\" data-screen-label=\"12 Remediation roadmap\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Remediation roadmap<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> three tiers · subtract first<\u002Fspan>\n      <span>Page 12 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"row between center\" style=\"margin-bottom:16px;\">\n      <div class=\"col gap-8\">\n        <span class=\"eyebrow\">Phase 5 — the plan<\u002Fspan>\n        <h2 class=\"h2\">Weeks, not a rebuild — and every tier removes before it adds.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"body\" style=\"width:400px; flex:none;\">Sequenced so the highest-leverage, lowest-risk work lands first: establish the tokens, make the surface calm, then migrate and refine. The throughline is subtraction — the ADHD-supportive interface is the quiet one.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"tiers grow\" style=\"align-items:stretch;\">\n      <div class=\"tier\" style=\"--tc:var(--hld-cyan);\">\n        <div class=\"band\"><\u002Fdiv>\n        <div class=\"row between center\"><span class=\"when\">Tier 1 · Foundation<\u002Fspan><span class=\"mono\" style=\"font-size:8px; color:var(--ink-mute);\">WK 1–2<\u002Fspan><\u002Fdiv>\n        <h3 class=\"h3\" style=\"font-size:14px; margin-top:8px;\">Set the system; calm the canvas.<\u002Fh3>\n        <ul>\n          <li>Ship the <b>18-colour<\u002Fb> tokens, <b>7-step<\u002Fb> type, <b>9-step<\u002Fb> spacing (Page 13).<\u002Fli>\n          <li><b>Denoise by default:<\u002Fb> wash, grid, scanline off; glow reserved for \"live.\"<\u002Fli>\n          <li>Canonical primitives: <b>Pip<\u002Fb> = the one status encoder; one input; one card.<\u002Fli>\n          <li>Critical a11y: <span class=\"mono\">:focus-visible<\u002Fspan> ring everywhere; fix the 4 contrast fails; real <span class=\"mono\">h1–h6<\u002Fspan>.<\u002Fli>\n        <\u002Ful>\n        <div class=\"panel panel--deep\" style=\"margin-top:auto; padding:8px 10px;\"><span class=\"sm\" style=\"font-size:10.5px;\">Biggest visible win for the least code.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tier\" style=\"--tc:var(--hld-yellow);\">\n        <div class=\"band\"><\u002Fdiv>\n        <div class=\"row between center\"><span class=\"when\">Tier 2 · Consistency<\u002Fspan><span class=\"mono\" style=\"font-size:8px; color:var(--ink-mute);\">WK 3–6<\u002Fspan><\u002Fdiv>\n        <h3 class=\"h3\" style=\"font-size:14px; margin-top:8px;\">Migrate everything onto the tokens.<\u002Fh3>\n        <ul>\n          <li>Retire strays: cyan-bright, pink, assembly, amber, scrollbar slates.<\u002Fli>\n          <li>Collapse encoders: meter → one <b>labelled bar<\u002Fb>; saved-dot → pip.<\u002Fli>\n          <li>Unify the <b>loading / error / empty<\u002Fb> state patterns.<\u002Fli>\n          <li>a11y: <b>44px<\u002Fb> targets; label the 8 tools; <span class=\"mono\">role=button<\u002Fspan> + keyboard on tiles &amp; rows.<\u002Fli>\n        <\u002Ful>\n        <div class=\"panel panel--deep\" style=\"margin-top:auto; padding:8px 10px;\"><span class=\"sm\" style=\"font-size:10.5px;\">Drain opportunistically, file-by-file.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tier\" style=\"--tc:var(--hld-green);\">\n        <div class=\"band\"><\u002Fdiv>\n        <div class=\"row between center\"><span class=\"when\">Tier 3 · Polish<\u002Fspan><span class=\"mono\" style=\"font-size:8px; color:var(--ink-mute);\">ONGOING<\u002Fspan><\u002Fdiv>\n        <h3 class=\"h3\" style=\"font-size:14px; margin-top:8px;\">Refine, then keep it honest.<\u002Fh3>\n        <ul>\n          <li>Motion &amp; interaction consistency; keep the reduced-motion gate ✓.<\u002Fli>\n          <li>Power-user: surface shortcuts beside their actions; batch moves.<\u002Fli>\n          <li>Help / onboarding continuity; first-run tool labels.<\u002Fli>\n          <li>A recurring <b>\"noise budget\"<\u002Fb> review so restraint stays enforced.<\u002Fli>\n        <\u002Ful>\n        <div class=\"panel panel--deep\" style=\"margin-top:auto; padding:8px 10px;\"><span class=\"sm\" style=\"font-size:10.5px;\">The discipline that prevents re-drift.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"panel brk\" style=\"--br:var(--hld-cyan); margin-top:16px; padding:13px 18px;\">\n      <div class=\"row gap-16 center\">\n        <span class=\"mono\" style=\"font-size:9px; letter-spacing:0.2em; color:var(--hld-cyan); writing-mode:vertical-rl; transform:rotate(180deg);\">PRINCIPLE<\u002Fspan>\n        <p class=\"body\" style=\"margin:0; font-size:13.5px;\"><b class=\"cyan\">Subtract first.<\u002Fb> The system already wrote the rules — one lit action, one status shape, glow means alive, colour means state. The whole roadmap is just enforcing what's already on the page. You're not designing a new language; you're holding the one you have.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Remediation roadmap<\u002Fspan>\n      <span>Mirrors the code audit's posture: maintain, don't rebuild<\u002Fspan>\n      <span class=\"pageno\">12<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ==================================== P13 · TOKEN STARTER KIT ======= -->\n  <section class=\"page\" id=\"p13\" data-screen-label=\"13 Design token starter kit\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Design token starter kit<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> the reference to pin up &amp; ship<\u002Fspan>\n      <span>Page 13 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"row between center\" style=\"margin-bottom:14px;\">\n      <div class=\"col gap-8\">\n        <span class=\"eyebrow\">Page 13 — the actionable artifact<\u002Fspan>\n        <h2 class=\"h2\">The rationalised system, at actual size and paste-ready.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"body\" style=\"width:380px; flex:none;\"><b>18 colours · 7 type steps · 9 spacing steps.<\u002Fb> Five accents carry state; two feature accents are quarantined under a namespace. This is the system to migrate onto — copy the code at right.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"row gap-20\" style=\"align-items:flex-start;\">\n      <!-- visual reference -->\n      <div class=\"col grow gap-12\" style=\"flex:1.15;\">\n        <div class=\"col gap-6\">\n          <span class=\"kicker\" style=\"font-size:8px;\">Colour · 18<\u002Fspan>\n          <div class=\"tok-grid\" style=\"grid-template-columns:repeat(3,1fr);\">\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#05090d;\"><\u002Fspan><span class=\"nm\">bg<\u002Fspan><span class=\"vl\">05090d<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#03060a;\"><\u002Fspan><span class=\"nm\">bg-deep<\u002Fspan><span class=\"vl\">03060a<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#0c1520;\"><\u002Fspan><span class=\"nm\">surface<\u002Fspan><span class=\"vl\">0c1520<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#111d2b;\"><\u002Fspan><span class=\"nm\">surface-2<\u002Fspan><span class=\"vl\">111d2b<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#080d13;\"><\u002Fspan><span class=\"nm\">surface-3<\u002Fspan><span class=\"vl\">080d13<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#172335;\"><\u002Fspan><span class=\"nm\">border<\u002Fspan><span class=\"vl\">172335<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#1f3050;\"><\u002Fspan><span class=\"nm\">border-str<\u002Fspan><span class=\"vl\">1f3050<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#c5d8e8;\"><\u002Fspan><span class=\"nm\">text<\u002Fspan><span class=\"vl\">c5d8e8<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#ffffff;\"><\u002Fspan><span class=\"nm\">text-br<\u002Fspan><span class=\"vl\">ffffff<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#8aa6c4;\"><\u002Fspan><span class=\"nm\">muted<\u002Fspan><span class=\"vl\">8aa6c4<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#6f8cab;\"><\u002Fspan><span class=\"nm\">muted-2<\u002Fspan><span class=\"vl\">6f8cab<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#3d5570;\"><\u002Fspan><span class=\"nm\">decor*<\u002Fspan><span class=\"vl\">3d5570<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\" style=\"outline:1px solid rgba(0,232,245,0.3); outline-offset:-1px;\"><span class=\"sw2\" style=\"background:#00e8f5;\"><\u002Fspan><span class=\"nm\">active<\u002Fspan><span class=\"vl\">00e8f5<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#00e870;\"><\u002Fspan><span class=\"nm\">success<\u002Fspan><span class=\"vl\">00e870<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#ffe600;\"><\u002Fspan><span class=\"nm\">attention<\u002Fspan><span class=\"vl\">ffe600<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#ff1060;\"><\u002Fspan><span class=\"nm\">danger<\u002Fspan><span class=\"vl\">ff1060<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#aa00ff;\"><\u002Fspan><span class=\"nm\">running<\u002Fspan><span class=\"vl\">aa00ff<\u002Fspan><\u002Fdiv>\n            <div class=\"tok\"><span class=\"sw2\" style=\"background:#ffcc00;\"><\u002Fspan><span class=\"nm\">feat·conf<\u002Fspan><span class=\"vl\">ffcc00<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"sm\" style=\"font-size:9px; color:var(--hld-muted);\"><span class=\"mono\">decor*<\u002Fspan> = decorative only, never used as text · <span class=\"mono\">feat·tone<\u002Fspan> #7c8bff completes the 18<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"row gap-16\">\n          <div class=\"col gap-6\" style=\"flex:1.2;\">\n            <span class=\"kicker\" style=\"font-size:8px;\">Type · 7<\u002Fspan>\n            <div class=\"panel col\" style=\"padding:0;\">\n              <div class=\"spec\" style=\"padding:5px 10px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:21px; font-weight:800; color:#c5d8e8;\">Heading xl<\u002Fdiv><div class=\"meta\" style=\"padding-right:10px;\">32/800<\u002Fdiv><\u002Fdiv>\n              <div class=\"spec\" style=\"padding:5px 10px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:17px; font-weight:700; color:#c5d8e8;\">Heading lg<\u002Fdiv><div class=\"meta\" style=\"padding-right:10px;\">24/700<\u002Fdiv><\u002Fdiv>\n              <div class=\"spec\" style=\"padding:5px 10px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:14px; font-weight:600; color:#c5d8e8;\">Heading md<\u002Fdiv><div class=\"meta\" style=\"padding-right:10px;\">19/600<\u002Fdiv><\u002Fdiv>\n              <div class=\"spec\" style=\"padding:5px 10px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:13px; color:#c5d8e8;\">Body reading<\u002Fdiv><div class=\"meta\" style=\"padding-right:10px;\">14<\u002Fdiv><\u002Fdiv>\n              <div class=\"spec\" style=\"padding:5px 10px;\"><div class=\"samp mono\" style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#8aa6c4;\">Label caps<\u002Fdiv><div class=\"meta\" style=\"padding-right:10px;\">10<\u002Fdiv><\u002Fdiv>\n              <div class=\"spec\" style=\"padding:5px 10px; border-bottom:0;\"><div class=\"samp mono\" style=\"font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:#6f8cab;\">Meta · floor<\u002Fdiv><div class=\"meta\" style=\"padding-right:10px;\">9<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"col gap-6\" style=\"flex:1;\">\n            <span class=\"kicker\" style=\"font-size:8px;\">Spacing · 9<\u002Fspan>\n            <div class=\"panel col gap-8\" style=\"padding:12px;\">\n              <div class=\"row\" style=\"gap:3px; align-items:flex-end; height:64px;\">\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:2px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">2<\u002Fspan><\u002Fdiv>\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:4px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">4<\u002Fspan><\u002Fdiv>\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:8px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">8<\u002Fspan><\u002Fdiv>\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:12px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">12<\u002Fspan><\u002Fdiv>\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:16px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">16<\u002Fspan><\u002Fdiv>\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:24px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">24<\u002Fspan><\u002Fdiv>\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:32px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">32<\u002Fspan><\u002Fdiv>\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:48px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">48<\u002Fspan><\u002Fdiv>\n                <div class=\"col center\" style=\"gap:3px;\"><div style=\"width:14px; height:60px; background:#00e8f5;\"><\u002Fdiv><span class=\"mono\" style=\"font-size:7px; color:#6f8cab;\">64<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <span class=\"sm\" style=\"font-size:9px; color:var(--hld-muted);\">Radii stay square (0); pill only for the rare dot.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- code -->\n      <div class=\"col gap-10\" style=\"flex:1;\">\n        <div class=\"col gap-5\">\n          <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-green);\"><\u002Fspan><span class=\"l\">CSS custom properties<\u002Fspan><\u002Fdiv>\n          <div class=\"code\"><span class=\"c-com\">:root {<\u002Fspan>\n  <span class=\"c-com\">/* surfaces */<\u002Fspan>\n  <span class=\"c-tok\">--bg<\u002Fspan>:<span class=\"c-val\">#05090d<\u002Fspan>; <span class=\"c-tok\">--surface<\u002Fspan>:<span class=\"c-val\">#0c1520<\u002Fspan>;\n  <span class=\"c-tok\">--surface-2<\u002Fspan>:<span class=\"c-val\">#111d2b<\u002Fspan>; <span class=\"c-tok\">--surface-3<\u002Fspan>:<span class=\"c-val\">#080d13<\u002Fspan>;\n  <span class=\"c-com\">/* structure */<\u002Fspan>\n  <span class=\"c-tok\">--border<\u002Fspan>:<span class=\"c-val\">#172335<\u002Fspan>; <span class=\"c-tok\">--border-strong<\u002Fspan>:<span class=\"c-val\">#1f3050<\u002Fspan>;\n  <span class=\"c-com\">/* text */<\u002Fspan>\n  <span class=\"c-tok\">--text<\u002Fspan>:<span class=\"c-val\">#c5d8e8<\u002Fspan>; <span class=\"c-tok\">--text-muted<\u002Fspan>:<span class=\"c-val\">#8aa6c4<\u002Fspan>;\n  <span class=\"c-com\">/* state — five, each one meaning */<\u002Fspan>\n  <span class=\"c-tok\">--active<\u002Fspan>:<span class=\"c-val\">#00e8f5<\u002Fspan>; <span class=\"c-tok\">--success<\u002Fspan>:<span class=\"c-val\">#00e870<\u002Fspan>;\n  <span class=\"c-tok\">--attention<\u002Fspan>:<span class=\"c-val\">#ffe600<\u002Fspan>; <span class=\"c-tok\">--danger<\u002Fspan>:<span class=\"c-val\">#ff1060<\u002Fspan>;\n  <span class=\"c-tok\">--running<\u002Fspan>:<span class=\"c-val\">#aa00ff<\u002Fspan>;\n  <span class=\"c-com\">/* feature — namespaced, not core state */<\u002Fspan>\n  <span class=\"c-tok\">--feat-confidence<\u002Fspan>:<span class=\"c-val\">#ffcc00<\u002Fspan>; <span class=\"c-tok\">--feat-tone<\u002Fspan>:<span class=\"c-val\">#7c8bff<\u002Fspan>;\n<span class=\"c-com\">}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"col gap-5\">\n          <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-cyan);\"><\u002Fspan><span class=\"l\">Tailwind v4 · @theme<\u002Fspan><\u002Fdiv>\n          <div class=\"code\"><span class=\"c-com\">@theme {<\u002Fspan>\n  <span class=\"c-tok\">--color-active<\u002Fspan>:<span class=\"c-val\">#00e8f5<\u002Fspan>;  <span class=\"c-com\">/* → bg-active */<\u002Fspan>\n  <span class=\"c-tok\">--color-success<\u002Fspan>:<span class=\"c-val\">#00e870<\u002Fspan>;\n  <span class=\"c-tok\">--color-attention<\u002Fspan>:<span class=\"c-val\">#ffe600<\u002Fspan>;\n  <span class=\"c-tok\">--color-danger<\u002Fspan>:<span class=\"c-val\">#ff1060<\u002Fspan>;\n  <span class=\"c-tok\">--color-running<\u002Fspan>:<span class=\"c-val\">#aa00ff<\u002Fspan>;\n  <span class=\"c-tok\">--color-surface<\u002Fspan>:<span class=\"c-val\">#0c1520<\u002Fspan>;\n  <span class=\"c-tok\">--text-label<\u002Fspan>:<span class=\"c-val\">10px<\u002Fspan>; <span class=\"c-tok\">--text-meta<\u002Fspan>:<span class=\"c-val\">9px<\u002Fspan>;\n<span class=\"c-com\">}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Design token starter kit<\u002Fspan>\n      <span>Pin this up · migrate onto it in Tier 1<\u002Fspan>\n      <span class=\"pageno\">13<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- @@INSERT@@ -->\n<\u002Fdiv>\n\n<script>\n  (function () {\n    var doc = document.querySelector('.doc');\n    function fit() {\n      if (window.matchMedia('print').matches) { doc.style.transform = 'none'; document.body.style.height = ''; return; }\n      var s = Math.min(1, (window.innerWidth - 40) / 1440);\n      doc.style.transform = 'translateX(-50%) scale(' + s + ')';\n      document.body.style.height = (doc.offsetHeight * s) + 'px';\n    }\n    window.addEventListener('resize', fit);\n    window.addEventListener('load', fit);\n    fit();\n    // smooth in-page nav accounting for scale\n    document.querySelectorAll('.tocnav a').forEach(function (a) {\n      a.addEventListener('click', function (e) {\n        e.preventDefault();\n        var t = document.querySelector(a.getAttribute('href'));\n        if (!t) return;\n        var s = Math.min(1, (window.innerWidth - 40) / 1440);\n        window.scrollTo({ top: t.offsetTop * s, behavior: 'smooth' });\n      });\n    });\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
