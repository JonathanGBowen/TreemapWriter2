  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Visual Design Audit — Socratic Co-Writer<\u002Ftitle>\n<style>/* ============================================================================\n   DESIGN AUDIT — report stylesheet\n   ----------------------------------------------------------------------------\n   The audit speaks the product's own language (HLD: near-black canvas, mono\n   chrome, neon accents) but practices the restraint it preaches: the REPORT\n   frame is calm and flat — accents appear only on the one key mark per page.\n   The RECONSTRUCTED product panels (.repro) deliberately turn the atmosphere\n   on (washes, scanlines, glowing pips) so the noise being audited is visible.\n   Inherits every --hld-* token, font, and .hld-* class from the design system.\n   ============================================================================ */\n\n/* ============================================================================\n   Socratic Co-Writer — Design System entry stylesheet\n   ----------------------------------------------------------------------------\n   Hyper Light Drifter aesthetic for TreemapWriter2: a single-user assistive\n   writing tool that structures (not summarizes) academic argument.\n\n   Consumers link THIS one file. It is an @import manifest only — every token,\n   font, and foundation primitive ships through the closure below. Order\n   matters: fonts → tokens (values) → foundation (base canvas + primitives\n   that reference the tokens).\n   ============================================================================ */\n\n/* ============================================================================\n   FONTS — Socratic Co-Writer (Hyper Light Drifter aesthetic)\n   ----------------------------------------------------------------------------\n   Two families, exactly as the product ships:\n     • Inter          — the reading/prose surface and any sans body text\n     • JetBrains Mono — ALL chrome, labels, glyphs, data, status text\n   Self-hosted .woff2 binaries (the same @fontsource packages the product\n   bundles via Vite), so the system works offline and ships the fonts to\n   consumers through this stylesheet's closure. Weights mirror the product:\n   Inter 300/400/500/600/700, JetBrains Mono 400/500/600/700.\n   ============================================================================ */\n\n/* ---- Inter (prose / sans) --------------------------------------------- */\n@font-face {\n  font-family: \"Inter\";\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"4ef4ec2f-8daf-4a82-b2a3-de01ee41e5f2\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"Inter\";\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ccbe708e-2d43-4c85-ae1a-7abd859b8d2e\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"Inter\";\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"42e74d27-f0f5-47de-a906-9eef851b45bb\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"Inter\";\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f1b9caa7-02c2-465d-9a12-afbf1a52df2a\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"Inter\";\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ce6c48a8-75d5-47a8-8c88-7437f89ff223\") format(\"woff2\");\n}\n\n/* ---- JetBrains Mono (chrome / glyphs / data) -------------------------- */\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"af20042c-b926-49a8-a9dd-64a5b8566c83\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9e7f141e-c868-4b61-8351-0ba1ed71a926\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"dce5e3d3-8b19-4ccf-869f-c615ed02d073\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f4666afe-faea-45a6-9a64-ab845618177c\") format(\"woff2\");\n}\n\n/* ============================================================================\n   COLORS — Hyper Light Drifter palette\n   ----------------------------------------------------------------------------\n   A near-black cool canvas lit by a handful of saturated neon accents. The\n   palette is a STATE VOCABULARY first and a decoration second: each accent\n   carries one meaning, used consistently everywhere (treemap tiles, pips,\n   badges, headings). Restraint is the rule — most of any screen is the dark\n   canvas and muted text; accents appear only where something is happening.\n   ============================================================================ */\n\n:root {\n  /* ---- Canvas & surfaces (near-black, cool, layered by elevation) -------- */\n  --hld-bg:          #05090d;  /* app canvas — the darkest reading ground     */\n  --hld-bg-deep:     #03060a;  /* deeper-than-bg (topology maps, voids)       */\n  --hld-surface:     #0c1520;  /* panels, sidebars, toolbars                  */\n  --hld-surface-2:   #111d2b;  /* raised: headers, hovered rows, chips        */\n  --hld-surface-3:   #080d13;  /* inset: inputs, search fields, map wells     */\n\n  /* ---- Structure (hairlines, not boxes) ---------------------------------- */\n  --hld-border:      #172335;  /* the one hairline seam, everywhere           */\n  --hld-border-2:    #1e293b;  /* slightly lighter rule / neutral tile edge   */\n  --hld-grid:        #1f3050;  /* background dot-grid dots                     */\n\n  /* ---- Neon accents — each is a fixed meaning --------------------------- */\n  --hld-cyan:        #00e8f5;  /* ACTIVE · the one next action · selection    */\n  --hld-cyan-bright: #00f0ff;  /* caret / brightest hover tint of cyan        */\n  --hld-magenta:     #ff1060;  /* MISSING / FAILING / draft · H1 · destructive*/\n  --hld-pink:        #ff1060;  /* alias of magenta (legacy token name)        */\n  --hld-green:       #00e870;  /* DONE / SAFE / solid · saved                 */\n  --hld-yellow:      #ffe600;  /* ATTENTION / stale / developing              */\n  --hld-purple:      #aa00ff;  /* RUNNING / secondary state                   */\n  --hld-orange:      #ff8800;  /* tertiary accent · H5 · numbers in code      */\n  --hld-amber:       #ffb020;  /* search-hit highlight                        */\n\n  /* ---- Specialised accents (Glass-Box revision engine) ------------------- */\n  --hld-gold:        #ffcc00;  /* confidence numerals                         */\n  --hld-assembly:    #e5ff00;  /* assembly-mode accent                        */\n  --hld-indigo:      #7c8bff;  /* tone-adjustment chip                        */\n\n  /* ---- Text (cool desaturated blues; never pure white for body) ---------- */\n  --hld-text:          #c5d8e8; /* primary reading + UI text                  */\n  --hld-text-bright:   #ffffff; /* strong emphasis (bold inline, focus tile)  */\n  --hld-muted-text:    #6f8cab; /* readable muted (~5.3:1) — captions, counts */\n  --hld-muted-text-2:  #8aa6c4; /* calmer muted (~6.3:1) — secondary content  */\n  --hld-muted:         #3d5570; /* DECORATIVE only — dividers, idle pips      */\n\n  /* ======================================================================\n     SEMANTIC ALIASES — prefer these in components & layouts\n     ====================================================================== */\n\n  /* Surfaces */\n  --surface-canvas:      var(--hld-bg);\n  --surface-canvas-deep: var(--hld-bg-deep);\n  --surface-panel:       var(--hld-surface);\n  --surface-raised:      var(--hld-surface-2);\n  --surface-inset:       var(--hld-surface-3);\n  --border-hairline:     var(--hld-border);\n  --border-rule:         var(--hld-border-2);\n\n  /* Text */\n  --text-primary:    var(--hld-text);\n  --text-strong:     var(--hld-text-bright);\n  --text-muted:      var(--hld-muted-text);\n  --text-secondary:  var(--hld-muted-text-2);\n  --text-decorative: var(--hld-muted);\n\n  /* Action / state accents */\n  --accent-active:    var(--hld-cyan);    /* THE next action, selection, focus */\n  --accent-danger:    var(--hld-magenta); /* missing, failing, draft, delete   */\n  --accent-success:   var(--hld-green);   /* done, solid, saved                */\n  --accent-attention: var(--hld-yellow);  /* stale, developing, warning        */\n  --accent-running:   var(--hld-purple);  /* in-flight / secondary             */\n\n  /* Readiness ladder (diagnostic) — draft → developing → nearly → solid */\n  --readiness-draft:        var(--hld-magenta);\n  --readiness-developing:   var(--hld-yellow);\n  --readiness-nearly-there: var(--hld-cyan);\n  --readiness-solid:        var(--hld-green);\n\n  /* Markdown heading hierarchy — the editor's \"rainbow\" ladder by depth */\n  --heading-1: var(--hld-magenta);\n  --heading-2: var(--hld-cyan);\n  --heading-3: var(--hld-yellow);\n  --heading-4: var(--hld-green);\n  --heading-5: var(--hld-orange);\n  --heading-6: var(--hld-text);\n}\n\n/* ============================================================================\n   TYPOGRAPHY — JetBrains Mono chrome · Inter prose\n   ----------------------------------------------------------------------------\n   Two voices, sharply divided:\n     • CHROME (JetBrains Mono): every label, button, status word, count,\n       breadcrumb and glyph. Almost always UPPERCASE with wide tracking and\n       tiny (8–11px). This is the \"spare, glyph-driven\" voice — the UI barely\n       speaks, and when it does it whispers in mono caps.\n     • PROSE (Inter): the reading/writing surface and any sentence-level\n       reading content (claims, diagnoses, dialogue). Comfortable size, tall\n       1.8 line-height, never uppercased.\n   The scale has an 8px FLOOR — chrome is small but never smaller than 8px.\n   ============================================================================ */\n\n:root {\n  /* ---- Families --------------------------------------------------------- */\n  --font-sans: \"Inter\", ui-sans-serif, system-ui, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* Role aliases */\n  --font-chrome: var(--font-mono);  /* labels, buttons, data, glyphs         */\n  --font-prose:  var(--font-sans);  /* the reading/writing surface           */\n\n  /* ---- Chrome scale (mono, uppercase, tracked) — floor 8px -------------- */\n  --text-ui-label:   9px;   /* zone eyebrows, section dividers               */\n  --text-ui-row:     11px;  /* section-tree row titles                       */\n  --text-ui-btn:     10px;  /* toolbar / AI button labels                    */\n  --text-ui-meta:    9px;   /* word-counts, status eyebrows, breadcrumb      */\n  --text-ui-eyebrow: 9px;   /* eyebrow floor                                 */\n  --text-ui-stat:    18px;  /* big Words / Sections numerals                 */\n\n  /* ---- Reading scale (sans) — floor for sentence content --------------- */\n  --text-body:    13px;  /* primary reading content (claims, diagnoses)      */\n  --text-body-sm: 12px;  /* dense secondary content inside disclosures       */\n  --text-lead:    15px;  /* section title in panel header                    */\n\n  /* ---- Editor prose surface -------------------------------------------- */\n  --text-editor:        14px;\n  --line-height-editor: 1.8;\n  --line-height-prose:  1.65;\n  --line-height-tight:  1.2;\n\n  /* ---- Weights ---------------------------------------------------------- */\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-heavy:    800;  /* H1 display weight                              */\n\n  /* ---- Tracking (letter-spacing) — the mono \"voice\" ribbon ------------- */\n  --tracking-tight:  -0.02em;  /* large display headings                     */\n  --tracking-snug:   -0.01em;  /* section titles / leads                     */\n  --tracking-normal: 0;\n  --tracking-wide:   0.1em;    /* meta / counts                              */\n  --tracking-wider:  0.12em;   /* button + row labels                        */\n  --tracking-widest: 0.14em;   /* eyebrows                                   */\n  --tracking-max:    0.16em;   /* the quietest, widest captions              */\n}\n\n/* ============================================================================\n   SPACING, SIZING & RADII\n   ----------------------------------------------------------------------------\n   A tight, even scale (multiples of 2/4) to match the dense, compact chrome.\n   Corners are SQUARE by identity — the aesthetic is glyphic, not rounded.\n   Radius tokens exist only for the two exceptions (code chips, tooltips); use\n   --radius-none everywhere else. Borders are 1px hairlines; \"structure\" is a\n   rule, not a box.\n   ============================================================================ */\n\n:root {\n  /* ---- Spacing scale ---------------------------------------------------- */\n  --space-0:  0;\n  --space-1:  2px;\n  --space-2:  4px;\n  --space-3:  6px;\n  --space-4:  8px;\n  --space-5:  10px;\n  --space-6:  12px;\n  --space-8:  16px;\n  --space-10: 20px;\n  --space-12: 24px;\n  --space-16: 32px;\n  --space-20: 40px;\n  --space-24: 48px;\n  --space-32: 64px;\n\n  /* ---- Radii — square by default --------------------------------------- */\n  --radius-none: 0;       /* DEFAULT — panels, buttons, inputs, cards, tiles */\n  --radius-sm:   2px;\n  --radius-md:   4px;      /* code chips, tooltips, autocomplete popovers     */\n  --radius-pill: 9999px;   /* the rare dot (saved indicator) only            */\n\n  /* ---- Border widths ---------------------------------------------------- */\n  --border-thin:   1px;    /* the universal hairline                         */\n  --border-accent: 1.5px;  /* corner brackets                                */\n  --border-bar:    2px;    /* selected-row left bar, focus underlines        */\n\n  /* ---- Key fixed sizes (chrome) ---------------------------------------- */\n  --pip-sm: 4px;\n  --pip-md: 6px;   /* the canonical status diamond                          */\n  --pip-lg: 8px;\n  --bracket-size: 7px;     /* corner-bracket arm length                      */\n  --toolbar-h: 56px;       /* editor toolbar height                          */\n  --hit-target: 28px;      /* minimum interactive square (dense desktop UI)  */\n\n  /* ---- Layout rails ----------------------------------------------------- */\n  --rail-sidebar:  300px;  /* default left rail width                        */\n  --rail-panel:    360px;  /* right tests panel width                        */\n  --measure-prose: 800px;  /* max reading width of the editor surface        */\n}\n\n/* ============================================================================\n   EFFECTS — glows, shadows, motion, texture\n   ----------------------------------------------------------------------------\n   The \"juice\" of Hyper Light Drifter. Two ideas do almost all the work:\n     1. GLOW — neon accents emit a soft outer (and sometimes inner) bloom.\n        A lit element glows; an idle one doesn't. Glow = \"this is alive\".\n     2. TEXTURE — a faint scanline + a background dot-grid give the dark\n        canvas a CRT-terminal depth without ever competing with content.\n   Motion is restrained: 150ms cool-out easing for state, slow pulses only for\n   genuinely in-flight states. Decorative looping is forbidden.\n   ============================================================================ */\n\n:root {\n  /* ---- Outer glows (box-shadow) — keyed to each accent ------------------ */\n  --glow-cyan:    0 0 10px rgba(0, 232, 245, 0.20);\n  --glow-cyan-lg: 0 0 18px rgba(0, 232, 245, 0.25);\n  --glow-magenta: 0 0 10px rgba(255, 16, 96, 0.20);\n  --glow-green:   0 0 10px rgba(0, 232, 112, 0.25);\n  --glow-yellow:  0 0 10px rgba(255, 230, 0, 0.20);\n  --glow-purple:  0 0 10px rgba(170, 0, 255, 0.20);\n  /* status-diamond bloom */\n  --glow-pip:     0 0 6px currentColor;  /* @kind shadow */\n\n  /* The \"lit\" surface — the one next action: faint fill + ring + bloom */\n  --lit-cyan-bg:     rgba(0, 232, 245, 0.07);\n  --lit-cyan-border: rgba(0, 232, 245, 0.35);\n  --lit-cyan-shadow: 0 0 18px rgba(0, 232, 245, 0.12), inset 0 0 18px rgba(0, 232, 245, 0.04);\n  --lit-magenta-bg:     rgba(255, 16, 96, 0.06);\n  --lit-magenta-border: rgba(255, 16, 96, 0.40);\n  --lit-magenta-shadow: 0 0 18px rgba(255, 16, 96, 0.12), inset 0 0 18px rgba(255, 16, 96, 0.04);\n\n  /* ---- Drop shadows (sparse — depth for modals/popovers only) ----------- */\n  --shadow-panel:   0 1px 2px rgba(0, 0, 0, 0.40);\n  --shadow-popover: 0 4px 12px rgba(0, 0, 0, 0.50);\n  --shadow-modal:   0 0 50px rgba(0, 0, 0, 0.50);\n\n  /* ---- Text glow -------------------------------------------------------- */\n  --text-glow-cyan: 0 0 8px rgba(0, 240, 255, 0.50);\n\n  /* ---- Background atmosphere (canvas wash + dot grid) ------------------- */\n  --bg-wash:\n    radial-gradient(ellipse 60% 50% at 15% 50%, rgba(0, 232, 245, 0.03) 0%, transparent 100%),\n    radial-gradient(ellipse 40% 60% at 85% 20%, rgba(255, 16, 96, 0.025) 0%, transparent 100%),\n    radial-gradient(circle, var(--hld-grid) 1px, transparent 1px);\n  --bg-wash-size: auto, auto, 22px 22px;\n\n  /* ---- Motion ----------------------------------------------------------- */\n  /* The one state easing + the durations that pair with it. */\n  --ease-out:     cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --dur-fast:     120ms;  /* @kind other */\n  --dur-base:     150ms;  /* @kind other */\n  --dur-slow:     300ms;  /* @kind other */\n  --dur-enter:    700ms;  /* @kind other */\n  --pulse-period: 1.4s;   /* @kind other */\n}\n\n/* ----------------------------------------------------------------------------\n   KEYFRAMES — gated behind prefers-reduced-motion where decorative.\n   ---------------------------------------------------------------------------- */\n\n/* Slow attention pulse for in-flight states (sync, running). */\n@keyframes hld-pip-pulse {\n  0%, 100% { opacity: 1; }\n  50%      { opacity: 0.35; }\n}\n\n/* Scale+opacity pulse for rotated \"working\" diamonds (keeps the 45deg). */\n@keyframes hld-pulse {\n  0%, 100% { opacity: 1;    transform: rotate(45deg) scale(1); }\n  50%      { opacity: 0.45; transform: rotate(45deg) scale(1.35); }\n}\n\n/* One-shot \"you arrived here\" line flash. */\n@keyframes hld-line-pulse {\n  0%   { background: rgba(0, 232, 245, 0.16); }\n  100% { background: transparent; }\n}\n\n/* Progress sweep (generate buttons). */\n@keyframes hld-sweep {\n  0%   { transform: translateX(-100%); }\n  100% { transform: translateX(280%); }\n}\n\n/* ============================================================================\n   FOUNDATION — base canvas + the reusable HLD primitive classes\n   ----------------------------------------------------------------------------\n   These are the literal building blocks of the Socratic Co-Writer surface:\n   the dark canvas with its CRT atmosphere, square glyphic scrollbars, and the\n   four signature primitives that recur everywhere —\n     .hld-scanline  CRT scanline overlay (opt-in per surface)\n     .hld-lit       THE one next action (max ONE per surface): cyan/magenta glow\n     .bracketed     corner brackets ⌐..⌐ framing a focal element\n     .hld-pip       the status diamond — one state vocabulary\n   Components and specimen cards lean on these directly, so they live in the\n   shipped CSS closure (imported by styles.css), not inside any one component.\n   ============================================================================ */\n\n/* ---- Reset-ish base ----------------------------------------------------- */\n*,\n*::before,\n*::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-prose);\n  font-size: var(--text-body);\n  line-height: var(--line-height-prose);\n  color: var(--text-primary);\n  background-color: var(--surface-canvas);\n  /* The signature atmosphere: two faint accent washes + a dot grid. */\n  background-image: var(--bg-wash);\n  background-size: var(--bg-wash-size);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n/* The mono \"voice\" — apply to any chrome text. */\n.hld-chrome {\n  font-family: var(--font-chrome);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-wider);\n}\n\n/* ============================================================================\n   SCANLINE — opt-in CRT overlay (apply to chrome surfaces, NOT reading panes)\n   pointer-events:none keeps it non-blocking.\n   ============================================================================ */\n.hld-scanline { position: relative; }\n.hld-scanline::after {\n  content: '';\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n  z-index: 1;\n  background: repeating-linear-gradient(\n    0deg, transparent, transparent 3px,\n    rgba(0, 0, 0, 0.06) 3px, rgba(0, 0, 0, 0.06) 4px\n  );\n}\n\n/* ============================================================================\n   LIT — the single next action on a surface. Use AT MOST ONE per visible\n   surface; it is how the eye finds \"what do I do here?\".\n   ============================================================================ */\n.hld-lit {\n  position: relative;\n  background: var(--lit-cyan-bg);\n  border: 1px solid var(--lit-cyan-border);\n  color: var(--hld-cyan);\n  box-shadow: var(--lit-cyan-shadow);\n  cursor: pointer;\n  transition: background var(--dur-base) var(--ease-out),\n              box-shadow var(--dur-base) var(--ease-out);\n}\n.hld-lit:hover:not(:disabled) {\n  background: rgba(0, 232, 245, 0.12);\n  box-shadow: var(--glow-cyan-lg);\n}\n.hld-lit-magenta {\n  position: relative;\n  background: var(--lit-magenta-bg);\n  border: 1px solid var(--lit-magenta-border);\n  color: var(--hld-magenta);\n  box-shadow: var(--lit-magenta-shadow);\n  cursor: pointer;\n  transition: background var(--dur-base) var(--ease-out),\n              box-shadow var(--dur-base) var(--ease-out);\n}\n.hld-lit-magenta:hover:not(:disabled) {\n  background: rgba(255, 16, 96, 0.10);\n  box-shadow: 0 0 24px rgba(255, 16, 96, 0.25);\n}\n\n/* ============================================================================\n   BRACKETED — corner brackets framing a focal element (top-left + bottom-right).\n   Set --br-color to recolor (defaults to cyan).\n   ============================================================================ */\n.bracketed { position: relative; }\n.bracketed::before,\n.bracketed::after {\n  content: '';\n  position: absolute;\n  width: var(--bracket-size);\n  height: var(--bracket-size);\n  pointer-events: none;\n  z-index: 2;\n}\n.bracketed::before {\n  top: 0; left: 0;\n  border-top: var(--border-accent) solid var(--br-color, var(--hld-cyan));\n  border-left: var(--border-accent) solid var(--br-color, var(--hld-cyan));\n}\n.bracketed::after {\n  bottom: 0; right: 0;\n  border-bottom: var(--border-accent) solid var(--br-color, var(--hld-cyan));\n  border-right: var(--border-accent) solid var(--br-color, var(--hld-cyan));\n}\n\n/* ============================================================================\n   PIP — the diamond status vocabulary. One shape, recolored by state.\n   green=done/safe · yellow=attention · magenta=missing/failing ·\n   cyan=active · purple=secondary · idle=untouched(hollow) · dim=inert.\n   ============================================================================ */\n.hld-pip {\n  width: var(--pip-md);\n  height: var(--pip-md);\n  transform: rotate(45deg);\n  flex: none;\n  display: inline-block;\n}\n.hld-pip-sm { width: var(--pip-sm); height: var(--pip-sm); }\n.hld-pip-lg { width: var(--pip-lg); height: var(--pip-lg); }\n.hld-pip-green   { background: var(--hld-green);   box-shadow: 0 0 6px var(--hld-green); }\n.hld-pip-yellow  { background: var(--hld-yellow);  box-shadow: 0 0 6px var(--hld-yellow); }\n.hld-pip-magenta { background: var(--hld-magenta); box-shadow: 0 0 6px var(--hld-magenta); }\n.hld-pip-cyan    { background: var(--hld-cyan);    box-shadow: 0 0 6px var(--hld-cyan); }\n.hld-pip-purple  { background: var(--hld-purple);  box-shadow: 0 0 6px var(--hld-purple); }\n.hld-pip-dim     { background: var(--hld-muted); }\n.hld-pip-idle    { background: transparent; border: 1px solid var(--hld-muted); }\n.hld-pip-pulse   { animation: hld-pip-pulse var(--pulse-period) ease-in-out infinite; }\n\n/* ============================================================================\n   GLOW UTILITIES — outer bloom on demand.\n   ============================================================================ */\n.hld-glow-cyan    { box-shadow: var(--glow-cyan); }\n.hld-glow-magenta { box-shadow: var(--glow-magenta); }\n.hld-glow-green   { box-shadow: var(--glow-green); }\n.hld-glow-purple  { box-shadow: var(--glow-purple); }\n.hld-text-glow    { text-shadow: var(--text-glow-cyan); }\n\n/* ============================================================================\n   HAIRLINE — the structural rule. A divider, never a container.\n   ============================================================================ */\n.hld-rule  { height: 1px; background: var(--border-hairline); border: 0; }\n.hld-vrule { width: 1px; background: var(--border-hairline); border: 0; align-self: stretch; }\n\n/* ============================================================================\n   SCROLLBARS — square, glyphic, dark-only.\n   ============================================================================ */\n* {\n  scrollbar-width: thin;\n  scrollbar-color: #22364e transparent;\n}\n*::-webkit-scrollbar { width: 8px; height: 8px; }\n*::-webkit-scrollbar-track {\n  background: transparent;\n  border-left: 1px solid var(--hld-border);\n}\n*::-webkit-scrollbar-thumb {\n  background: #22364e;\n  border: 1px solid #2a4258;\n  border-radius: 0;\n}\n*::-webkit-scrollbar-thumb:hover {\n  background: rgba(0, 232, 245, 0.45);\n  border-color: rgba(0, 232, 245, 0.70);\n  box-shadow: 0 0 8px rgba(0, 232, 245, 0.50);\n}\n*::-webkit-scrollbar-corner { background: transparent; }\n\n/* ============================================================================\n   MOTION GATE — honour reduced-motion for all decorative pulses/sweeps.\n   ============================================================================ */\n@media (prefers-reduced-motion: reduce) {\n  .hld-pip-pulse,\n  [style*=\"hld-pulse\"],\n  [style*=\"hld-sweep\"] { animation: none !important; }\n}\n\n/* ============================================================================\n   COMPONENT CLASSES — reusable interaction primitives\n   ----------------------------------------------------------------------------\n   The hover/focus/selected states that inline styles can't express, shipped as\n   classes so BOTH the React components and hand-authored card/kit HTML stay\n   visually identical. These are intentionally low-level: a button shell, a\n   field, a tool glyph, a row. They build on the tokens and the .hld-* glow\n   primitives in foundation.css.\n   ============================================================================ */\n\n/* ---- Chrome button base (mono caps, square, tiny) --------------------- */\n.hld-btn {\n  font-family: var(--font-mono);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-wider);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-ui-btn);\n  line-height: 1;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--space-3);\n  padding: var(--space-3) var(--space-6);\n  border: var(--border-thin) solid transparent;\n  border-radius: var(--radius-none);\n  background: transparent;\n  cursor: pointer;\n  white-space: nowrap;\n  transition: color var(--dur-base) var(--ease-out),\n              background var(--dur-base) var(--ease-out),\n              border-color var(--dur-base) var(--ease-out),\n              box-shadow var(--dur-base) var(--ease-out);\n}\n.hld-btn:disabled { opacity: 0.4; cursor: not-allowed; }\n.hld-btn-sm { padding: var(--space-2) var(--space-4); font-size: var(--text-ui-meta); gap: var(--space-2); }\n.hld-btn-lg { padding: var(--space-5) var(--space-10); font-size: var(--text-ui-row); letter-spacing: var(--tracking-widest); }\n\n/* Ghost — the default secondary action: hairline border, muted text → cyan. */\n.hld-btn-ghost { border-color: var(--border-hairline); color: var(--text-muted); }\n.hld-btn-ghost:hover:not(:disabled) { color: var(--accent-active); border-color: rgba(0, 232, 245, 0.40); }\n\n/* Neutral ghost — recedes further; hover only lifts to plain text. */\n.hld-btn-neutral { border-color: var(--border-hairline); color: var(--text-muted); }\n.hld-btn-neutral:hover:not(:disabled) { color: var(--text-primary); border-color: var(--border-rule); }\n\n/* Accent ghost — set --accent to colour it (Sprint=green, Session=cyan, …). */\n.hld-btn-accent {\n  border-color: color-mix(in srgb, var(--accent, var(--hld-cyan)) 30%, transparent);\n  color: var(--accent, var(--hld-cyan));\n}\n.hld-btn-accent:hover:not(:disabled) {\n  background: color-mix(in srgb, var(--accent, var(--hld-cyan)) 10%, transparent);\n  border-color: color-mix(in srgb, var(--accent, var(--hld-cyan)) 50%, transparent);\n}\n\n/* Lit — THE one next action: faint fill + ring + bloom. Max one per surface. */\n.hld-btn-lit {\n  background: var(--lit-cyan-bg);\n  border-color: var(--lit-cyan-border);\n  color: var(--hld-cyan);\n  box-shadow: var(--lit-cyan-shadow);\n}\n.hld-btn-lit:hover:not(:disabled) { background: rgba(0, 232, 245, 0.12); box-shadow: var(--glow-cyan-lg); }\n.hld-btn-lit-magenta {\n  background: var(--lit-magenta-bg);\n  border-color: var(--lit-magenta-border);\n  color: var(--hld-magenta);\n  box-shadow: var(--lit-magenta-shadow);\n}\n.hld-btn-lit-magenta:hover:not(:disabled) { background: rgba(255, 16, 96, 0.10); box-shadow: 0 0 24px rgba(255, 16, 96, 0.25); }\n\n/* ---- Tool glyph — monochrome square that lights cyan on hover --------- */\n.hld-tool {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  padding: var(--space-3);\n  font-family: var(--font-mono);\n  font-size: 13px;\n  line-height: 1;\n  color: var(--text-muted);\n  background: transparent;\n  border: var(--border-thin) solid transparent;\n  border-radius: var(--radius-none);\n  cursor: pointer;\n  transition: color var(--dur-base) var(--ease-out),\n              background var(--dur-base) var(--ease-out),\n              border-color var(--dur-base) var(--ease-out);\n}\n.hld-tool:hover:not(:disabled) {\n  color: var(--accent-active);\n  background: rgba(0, 232, 245, 0.05);\n  border-color: rgba(0, 232, 245, 0.35);\n}\n.hld-tool.is-active {\n  color: var(--accent-active);\n  background: rgba(0, 232, 245, 0.10);\n  border-color: rgba(0, 232, 245, 0.30);\n}\n\n/* ---- Field — text/search input -------------------------------------- */\n.hld-field {\n  width: 100%;\n  font-family: var(--font-mono);\n  font-size: var(--text-ui-btn);\n  letter-spacing: var(--tracking-wide);\n  color: var(--text-primary);\n  background: var(--surface-inset);\n  border: var(--border-thin) solid var(--border-hairline);\n  border-radius: var(--radius-none);\n  padding: var(--space-3) var(--space-5);\n  outline: none;\n  transition: border-color var(--dur-base) var(--ease-out),\n              box-shadow var(--dur-base) var(--ease-out);\n}\n.hld-field::placeholder { color: var(--text-muted); }\n.hld-field:focus { border-color: var(--accent-active); box-shadow: 0 0 0 1px rgba(0, 232, 245, 0.20); }\n.hld-field-prose {\n  font-family: var(--font-sans);\n  font-size: var(--text-body);\n  letter-spacing: 0;\n  line-height: var(--line-height-prose);\n  text-transform: none;\n}\n\n/* ---- Row — a list line that highlights on hover / when selected ------ */\n.hld-row {\n  display: flex;\n  align-items: center;\n  cursor: pointer;\n  position: relative;\n  user-select: none;\n  transition: background var(--dur-base) var(--ease-out);\n}\n.hld-row:hover { background: var(--surface-raised); }\n.hld-row.is-selected { background: rgba(0, 232, 245, 0.05); }\n.hld-row.is-selected::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: var(--border-bar);\n  background: var(--accent-active);\n  box-shadow: 0 0 6px var(--accent-active);\n}\n\n/* ---- Disclosure trigger — full-width mono caps toggle --------------- */\n.hld-disclosure {\n  display: flex;\n  align-items: center;\n  gap: var(--space-5);\n  width: 100%;\n  padding: 13px var(--space-1);\n  text-align: left;\n  background: transparent;\n  border: 0;\n  border-top: var(--border-thin) solid var(--border-hairline);\n  font-family: var(--font-mono);\n  font-size: var(--text-ui-btn);\n  font-weight: var(--weight-semibold);\n  letter-spacing: var(--tracking-wider);\n  text-transform: uppercase;\n  color: var(--text-secondary);\n  cursor: pointer;\n  transition: color var(--dur-base) var(--ease-out);\n}\n.hld-disclosure:hover { color: var(--accent-active); }\n\n\n\n/* ---------------------------------------------------------------- reset --- */\nhtml { background: #02050a; -webkit-text-size-adjust: 100%; }\nbody {\n  margin: 0;\n  /* Override the product's ambient wash — the report ground is FLAT. */\n  background-color: #02050a;\n  background-image: none;\n  color: var(--hld-text);\n  font-family: var(--font-sans);\n  font-size: 14px;\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n* { box-sizing: border-box; }\n\n/* ------------------------------------------------------------- the page --- */\n:root {\n  --page-w: 1440px;\n  --page-h: 900px;\n  --pad: 64px;\n  --ink: var(--hld-text);\n  --ink-bright: var(--hld-text-bright);\n  --ink-mute: var(--hld-muted-text);\n  --ink-mute2: var(--hld-muted-text-2);\n  --seam: var(--hld-border);\n  --seam-2: var(--hld-border-2);\n\n  /* severity ladder (Nielsen) — used ONLY as a legend, never decoration */\n  --sev-0: var(--hld-green);\n  --sev-1: var(--hld-cyan);\n  --sev-2: var(--hld-yellow);\n  --sev-3: var(--hld-orange);\n  --sev-4: var(--hld-magenta);\n}\n\n.doc {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 28px;\n  padding: 40px 24px 96px;\n  position: absolute;\n  top: 0; left: 50%;\n  transform: translateX(-50%);\n  transform-origin: top center;\n}\n\n.page {\n  position: relative;\n  width: var(--page-w);\n  height: var(--page-h);\n  flex: none;\n  background: var(--hld-bg);\n  border: 1px solid var(--seam);\n  box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 24px 60px rgba(0,0,0,0.55);\n  padding: var(--pad);\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n}\n.page--cover { background:\n  radial-gradient(ellipse 70% 60% at 18% 30%, rgba(0,232,245,0.05), transparent 70%),\n  radial-gradient(ellipse 50% 60% at 88% 88%, rgba(255,16,96,0.045), transparent 70%),\n  var(--hld-bg-deep); }\n\n/* running header / footer ------------------------------------------------- */\n.runhead {\n  display: flex; align-items: baseline; justify-content: space-between;\n  font-family: var(--font-mono);\n  font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;\n  color: var(--ink-mute); padding-bottom: 14px; margin-bottom: 26px;\n  border-bottom: 1px solid var(--seam);\n}\n.runhead .rh-sec { color: var(--hld-cyan); }\n.runhead .rh-dot { color: var(--hld-muted); padding: 0 8px; }\n.runfoot {\n  margin-top: auto; padding-top: 14px; border-top: 1px solid var(--seam);\n  display: flex; align-items: baseline; justify-content: space-between;\n  font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: var(--hld-muted);\n}\n.pageno { color: var(--ink-mute2); }\n\n/* ------------------------------------------------------------- type kit --- */\n.eyebrow {\n  font-family: var(--font-mono); font-weight: 600;\n  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;\n  color: var(--hld-cyan);\n}\n.eyebrow--mute { color: var(--ink-mute); }\n.h1 { font-size: 40px; line-height: 1.04; font-weight: 800; letter-spacing: -0.02em; color: var(--ink-bright); margin: 0; }\n.h2 { font-size: 27px; line-height: 1.08; font-weight: 700; letter-spacing: -0.015em; color: var(--ink-bright); margin: 0; text-wrap: balance; }\n.h3 { font-size: 17px; line-height: 1.2; font-weight: 700; letter-spacing: -0.01em; color: var(--ink-bright); margin: 0; }\n.kicker { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute2); margin: 0; }\n.deck { font-size: 15px; line-height: 1.6; color: var(--ink-mute2); max-width: 70ch; text-wrap: pretty; margin: 0; }\n.lede { font-size: 16px; line-height: 1.62; color: var(--ink); }\n.body { font-size: 13.5px; line-height: 1.62; color: var(--ink-mute2); text-wrap: pretty; }\n.sm { font-size: 12px; line-height: 1.55; color: var(--ink-mute); }\n.mono { font-family: var(--font-mono); }\n.tnum { font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\" 1; }\nb, strong { color: var(--ink-bright); font-weight: 600; }\n.cyan { color: var(--hld-cyan); } .mag { color: var(--hld-magenta); }\n.grn { color: var(--hld-green); } .yel { color: var(--hld-yellow); }\n.org { color: var(--hld-orange); } .pur { color: var(--hld-purple); }\n\n/* section heading rail (in-page) ------------------------------------------ */\n.secrail { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }\n.secrail .pip { width: 7px; height: 7px; transform: rotate(45deg); background: var(--hld-cyan); flex: none; }\n.secrail .l { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); }\n\n/* generic layout helpers -------------------------------------------------- */\n.row { display: flex; }\n.col { display: flex; flex-direction: column; }\n.grow { flex: 1; min-width: 0; min-height: 0; }\n.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; } .gap-32 { gap: 32px; }\n.wrap { flex-wrap: wrap; }\n.between { justify-content: space-between; }\n.center { align-items: center; }\n.mt-a { margin-top: auto; }\n\n/* panels ------------------------------------------------------------------ */\n.panel {\n  border: 1px solid var(--seam); background: var(--hld-surface);\n  padding: 18px; position: relative;\n}\n.panel--inset { background: var(--hld-surface-3); }\n.panel--deep { background: var(--hld-bg-deep); }\n.panel-h { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }\n.panel-h .t { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute2); }\n.panel-h .n { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; color: var(--hld-muted); }\n\n/* corner-bracket framing (focal) ------------------------------------------ */\n.brk { position: relative; }\n.brk::before, .brk::after { content:''; position:absolute; width:10px; height:10px; pointer-events:none; }\n.brk::before { top:0; left:0; border-top: 1.5px solid var(--br, var(--hld-cyan)); border-left: 1.5px solid var(--br, var(--hld-cyan)); }\n.brk::after { bottom:0; right:0; border-bottom: 1.5px solid var(--br, var(--hld-cyan)); border-right: 1.5px solid var(--br, var(--hld-cyan)); }\n\n/* ----------------------------------------------------- verdict / stats --- */\n.verdict { display: grid; grid-template-columns: auto 1fr; gap: 22px; align-items: center; }\n.gauge {\n  --v: 62; /* 0..100 health */\n  width: 132px; height: 132px; border-radius: 50%;\n  background:\n    conic-gradient(var(--hld-yellow) calc(var(--v) * 1%), rgba(255,255,255,0.05) 0);\n  display: grid; place-items: center; position: relative;\n}\n.gauge::after { content:''; position:absolute; inset:11px; border-radius:50%; background: var(--hld-bg-deep); border: 1px solid var(--seam); }\n.gauge .g-in { position: relative; z-index:1; text-align:center; }\n.gauge .g-v { font-family: var(--font-mono); font-size: 30px; font-weight: 700; color: var(--hld-yellow); line-height: 1; }\n.gauge .g-l { font-family: var(--font-mono); font-size: 7.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); margin-top: 4px; }\n\n.verdict-scale { display: flex; gap: 4px; margin-top: 10px; }\n.verdict-scale .vs { flex:1; text-align:center; font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.04em; text-transform: uppercase; padding: 7px 4px; border: 1px solid var(--seam); color: var(--hld-muted); background: var(--hld-surface-3); }\n.verdict-scale .vs.on { color: var(--hld-bg); background: var(--hld-yellow); border-color: var(--hld-yellow); font-weight: 700; box-shadow: 0 0 16px rgba(255,230,0,0.25); }\n\n/* stat tiles -------------------------------------------------------------- */\n.stats { display: grid; gap: 1px; background: var(--seam); border: 1px solid var(--seam); }\n.stat { background: var(--hld-surface); padding: 14px 16px; }\n.stat .k { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); }\n.stat .v { font-family: var(--font-mono); font-size: 30px; font-weight: 700; line-height: 1.05; color: var(--ink-bright); margin-top: 4px; }\n.stat .v small { font-size: 13px; color: var(--ink-mute); font-weight: 500; }\n.stat .h { font-size: 11px; color: var(--ink-mute2); margin-top: 2px; }\n.flag-over { color: var(--hld-orange); } .flag-ok { color: var(--hld-green); } .flag-warn { color: var(--hld-yellow); }\n.stat.is-over .v { color: var(--hld-orange); } .stat.is-ok .v { color: var(--hld-green); }\n.stat .bar { height: 4px; margin-top: 10px; background: rgba(255,255,255,0.05); position: relative; }\n.stat .bar i { position:absolute; left:0; top:0; bottom:0; display:block; }\n.stat .bar .heal { background: rgba(0,232,112,0.35); }\n.stat .bar .now { height:100%; }\n\n/* ------------------------------------------------------------- swatches --- */\n.swrow { display: flex; flex-wrap: wrap; gap: 10px; }\n.sw { width: 96px; }\n.sw .chip { height: 54px; border: 1px solid rgba(255,255,255,0.10); position: relative; }\n.sw .nm { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.04em; color: var(--ink); margin-top: 5px; text-transform: uppercase; }\n.sw .hex { font-family: var(--font-mono); font-size: 8px; color: var(--ink-mute); }\n.sw .cnt { position:absolute; top:4px; right:4px; font-family: var(--font-mono); font-size: 8px; padding: 1px 4px; background: rgba(0,0,0,0.55); color: #fff; }\n/* near-duplicate grouping bracket */\n.dupe { border: 1px dashed var(--hld-orange); padding: 8px; display:flex; gap:8px; position: relative; background: rgba(255,136,0,0.04); }\n.dupe::before { content: attr(data-flag); position:absolute; top:-8px; left:8px; font-family: var(--font-mono); font-size: 7.5px; letter-spacing:0.1em; text-transform:uppercase; color: var(--hld-orange); background: var(--hld-bg); padding: 0 5px; }\n.dupe .sw { width: 76px; }\n.dupe .sw .chip { height: 42px; }\n\n/* swap (current → proposed) ---------------------------------------------- */\n.swap { display:flex; align-items:center; gap:8px; }\n.swap .arrow { color: var(--hld-muted); font-family: var(--font-mono); font-size: 12px; }\n.swatch-stack { display:flex; }\n.swatch-stack .mini { width: 26px; height: 38px; border:1px solid rgba(0,0,0,0.4); margin-left:-1px; }\n\n/* -------------------------------------------------------------- ruler ----- */\n.ruler { position: relative; height: 132px; border-left: 1px solid var(--seam); margin-left: 4px; }\n.tick { position:absolute; bottom:0; width: 1px; background: rgba(255,255,255,0.08); }\n.tick.grid { background: rgba(0,232,245,0.25); }\n.tick .bx { position:absolute; bottom: 100%; left:50%; transform: translateX(-50%); margin-bottom: 4px; font-family: var(--font-mono); font-size: 8px; color: var(--ink-mute); white-space:nowrap; }\n.tick.off .bx { color: var(--hld-orange); }\n.tick.off { background: var(--hld-orange); }\n.tick .blk { position:absolute; bottom:0; left:0; width: 14px; transform: translateX(-50%); }\n.spacing-legend { display:flex; gap:16px; font-family: var(--font-mono); font-size: 8.5px; letter-spacing:0.1em; text-transform:uppercase; color: var(--ink-mute); }\n.spacing-legend i { display:inline-block; width:10px; height:10px; margin-right:5px; vertical-align:-1px; }\n\n/* --------------------------------------------------------- type specimen - */\n.spec { display: grid; grid-template-columns: 1fr auto; gap: 6px 18px; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--seam); }\n.spec .samp { color: var(--ink); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }\n.spec .meta { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; color: var(--ink-mute); text-align: right; white-space: nowrap; }\n.spec .meta .role { color: var(--hld-cyan); }\n.spec.bad .meta .role { color: var(--hld-orange); }\n\n/* ---------------------------------------------------- annotation system -- */\n.repro {\n  position: relative; border: 1px solid var(--seam); background: var(--hld-surface);\n  background-image:\n    radial-gradient(ellipse 60% 50% at 15% 50%, rgba(0,232,245,0.03) 0%, transparent 100%),\n    radial-gradient(ellipse 40% 60% at 85% 20%, rgba(255,16,96,0.025) 0%, transparent 100%),\n    radial-gradient(circle, var(--hld-grid) 1px, transparent 1px);\n  background-size: auto, auto, 22px 22px;\n  overflow: hidden;\n}\n.scan::after { content:''; position:absolute; inset:0; pointer-events:none; z-index:3;\n  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px); }\n\n.pin {\n  position: absolute; z-index: 6; width: 20px; height: 20px;\n  border-radius: 50%; display: grid; place-items: center;\n  font-family: var(--font-mono); font-size: 10px; font-weight: 700;\n  color: var(--hld-bg); background: var(--pc, var(--hld-cyan));\n  box-shadow: 0 0 0 3px var(--hld-bg), 0 0 12px var(--pc, var(--hld-cyan));\n}\n.ring { position: absolute; z-index: 5; border: 1.5px dashed var(--pc, var(--hld-cyan)); border-radius: 3px; pointer-events: none; }\n\n.notes { display: flex; flex-direction: column; gap: 9px; }\n.note { display: grid; grid-template-columns: 20px 1fr; gap: 10px; align-items: start; }\n.note .b { width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center; font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--hld-bg); background: var(--pc, var(--hld-cyan)); flex:none; }\n.note .tx { font-size: 12px; line-height: 1.5; color: var(--ink-mute2); }\n.note .tx b { color: var(--ink-bright); }\n\n/* severity chips ---------------------------------------------------------- */\n.sev { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 8.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 7px; border: 1px solid currentColor; white-space: nowrap; }\n.sev::before { content:''; width: 6px; height: 6px; transform: rotate(45deg); background: currentColor; }\n.sev-0 { color: var(--sev-0); } .sev-1 { color: var(--sev-1); } .sev-2 { color: var(--sev-2); }\n.sev-3 { color: var(--sev-3); } .sev-4 { color: var(--sev-4); }\n\n/* before / after ---------------------------------------------------------- */\n.ba { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--seam); border: 1px solid var(--seam); }\n.ba > div { background: var(--hld-surface); padding: 14px; position: relative; }\n.ba .tag { position:absolute; top: 8px; right: 8px; font-family: var(--font-mono); font-size: 7.5px; letter-spacing: 0.12em; text-transform: uppercase; padding: 2px 6px; }\n.ba .tag.bf { color: var(--hld-orange); border: 1px solid rgba(255,136,0,0.4); }\n.ba .tag.af { color: var(--hld-green); border: 1px solid rgba(0,232,112,0.4); }\n\n/* contrast pair ----------------------------------------------------------- */\n.cpair { border: 1px solid var(--seam); }\n.cpair .demo { padding: 12px 14px; font-size: 13px; }\n.cpair .info { display:flex; align-items:center; justify-content:space-between; padding: 7px 10px; border-top: 1px solid var(--seam); background: var(--hld-surface-3); font-family: var(--font-mono); font-size: 9px; }\n.ratio { font-weight: 700; }\n.ratio.fail { color: var(--hld-magenta); } .ratio.pass { color: var(--hld-green); }\n.badge-fail { color: var(--hld-magenta); border:1px solid currentColor; padding: 1px 5px; font-size: 8px; letter-spacing: 0.1em; }\n.badge-pass { color: var(--hld-green); border:1px solid currentColor; padding: 1px 5px; font-size: 8px; letter-spacing: 0.1em; }\n\n/* heading outline --------------------------------------------------------- */\n.outline { font-family: var(--font-mono); font-size: 11px; line-height: 1.9; }\n.outline .lv { color: var(--hld-cyan); }\n.outline .skip { color: var(--hld-orange); }\n.outline .bad { color: var(--hld-magenta); }\n.outline .tag { color: var(--hld-muted); }\n\n/* roadmap timeline -------------------------------------------------------- */\n.tiers { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }\n.tier { border: 1px solid var(--seam); background: var(--hld-surface); padding: 16px; position: relative; display:flex; flex-direction:column; }\n.tier .band { position:absolute; top:0; left:0; right:0; height: 3px; background: var(--tc, var(--hld-cyan)); box-shadow: 0 0 12px var(--tc, var(--hld-cyan)); }\n.tier .when { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--tc, var(--hld-cyan)); }\n.tier ul { margin: 10px 0 0; padding: 0; list-style: none; display:flex; flex-direction:column; gap: 9px; }\n.tier li { font-size: 12px; line-height: 1.45; color: var(--ink-mute2); padding-left: 16px; position: relative; }\n.tier li::before { content:''; position:absolute; left:0; top:6px; width:6px; height:6px; transform: rotate(45deg); background: var(--tc, var(--hld-cyan)); }\n\n/* token sheet ------------------------------------------------------------- */\n.tok-grid { display: grid; gap: 1px; background: var(--seam); border: 1px solid var(--seam); }\n.tok { background: var(--hld-surface); padding: 9px 10px; display:flex; align-items:center; gap: 9px; }\n.tok .sw2 { width: 22px; height: 22px; border:1px solid rgba(255,255,255,0.12); flex:none; }\n.tok .nm { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink); }\n.tok .vl { font-family: var(--font-mono); font-size: 8.5px; color: var(--ink-mute); margin-left: auto; }\n.code {\n  font-family: var(--font-mono); font-size: 10px; line-height: 1.65;\n  color: var(--ink-mute2); background: var(--hld-bg-deep); border: 1px solid var(--seam);\n  padding: 12px 14px; white-space: pre; overflow: hidden;\n}\n.code .c-tok { color: var(--hld-cyan); } .code .c-val { color: var(--hld-green); } .code .c-com { color: var(--hld-muted); }\n\n/* mini reconstructed workspace (used in repro panels) --------------------- */\n.mini { display: grid; height: 100%; font-family: var(--font-mono); }\n.mini-col { border-right: 1px solid var(--seam); padding: 10px; overflow: hidden; position: relative; }\n.mini-col:last-child { border-right: 0; }\n.mini-eyebrow { font-size: 7.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px; }\n.mini-row { display:flex; align-items:center; gap: 7px; padding: 5px 4px; font-size: 9px; color: var(--ink-mute2); border-bottom: 1px solid rgba(255,255,255,0.03); }\n.dia { width: 6px; height: 6px; transform: rotate(45deg); flex:none; }\n.dia.g { background: var(--hld-green); box-shadow: 0 0 6px var(--hld-green); }\n.dia.c { background: var(--hld-cyan); box-shadow: 0 0 6px var(--hld-cyan); }\n.dia.y { background: var(--hld-yellow); box-shadow: 0 0 6px var(--hld-yellow); }\n.dia.m { background: var(--hld-magenta); box-shadow: 0 0 6px var(--hld-magenta); }\n.dia.p { background: var(--hld-purple); box-shadow: 0 0 6px var(--hld-purple); }\n.dia.i { border: 1px solid var(--hld-muted); }\n.dia.d { background: var(--hld-muted); }\n\n/* ----------------------------------------------------------------- nav ---- */\n.tocnav {\n  position: fixed; top: 14px; right: 14px; z-index: 50;\n  display: flex; gap: 5px; flex-wrap: wrap; max-width: 220px; justify-content: flex-end;\n  background: rgba(3,6,10,0.85); backdrop-filter: blur(8px);\n  border: 1px solid var(--seam); padding: 8px;\n}\n.tocnav a { font-family: var(--font-mono); font-size: 9px; width: 20px; height: 20px; display:grid; place-items:center; color: var(--ink-mute); border: 1px solid var(--seam); text-decoration: none; }\n.tocnav a:hover { color: var(--hld-cyan); border-color: rgba(0,232,245,0.4); }\n\n/* ---------------------------------------------- overflow fixes (verifier) - */\n#p3 .spec { padding: 3px 0; }\n#p1 .stat { padding: 8px 14px; }\n#p1 .stat .v { font-size: 25px; }\n#p1 .panel.grow { padding: 11px !important; }\n\n/* ----------------------------------------------------------------- print -- */\n@media print {\n  @page { size: 1440px 900px; margin: 0; }\n  html, body { background: #fff; }\n  .tocnav { display: none !important; }\n  .doc { display: block; padding: 0; gap: 0; position: static; left: auto; transform: none !important; }\n  .page { box-shadow: none; border: 0; break-after: page; page-break-after: always; margin: 0; }\n  .page:last-child { break-after: auto; }\n  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<nav class=\"tocnav\" aria-label=\"Pages\">\n  <a href=\"#cover\">◆<\u002Fa>\n  <a href=\"#p1\">01<\u002Fa><a href=\"#p2\">02<\u002Fa><a href=\"#p3\">03<\u002Fa><a href=\"#p4\">04<\u002Fa>\n  <a href=\"#p5\">05<\u002Fa><a href=\"#p6\">06<\u002Fa><a href=\"#p7\">07<\u002Fa><a href=\"#p8\">08<\u002Fa>\n  <a href=\"#p9\">09<\u002Fa><a href=\"#p10\">10<\u002Fa><a href=\"#p11\">11<\u002Fa><a href=\"#p12\">12<\u002Fa><a href=\"#p13\">13<\u002Fa>\n<\u002Fnav>\n\n<div class=\"doc\">\n\n  <!-- ====================================================== COVER ======= -->\n  <section class=\"page page--cover\" id=\"cover\" data-screen-label=\"Cover\">\n    <div class=\"runhead\">\n      <span>Socratic Co-Writer <span class=\"rh-dot\">·<\u002Fspan> TreemapWriter2<\u002Fspan>\n      <span>Visual Design Audit <span class=\"rh-dot\">·<\u002Fspan> <span class=\"rh-sec\">v1<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"col grow\" style=\"justify-content:center; gap:28px;\">\n      <div class=\"secrail\"><span class=\"pip\"><\u002Fspan><span class=\"l\">Design-layer forensic · reconstruction-based<\u002Fspan><\u002Fdiv>\n      <h1 class=\"h1\" style=\"font-size:72px; max-width:20ch;\">The system has a<br>design language.<br><span class=\"cyan\">It isn't enforcing it.<\u002Fspan><\u002Fh1>\n      <p class=\"deck\" style=\"font-size:17px; max-width:64ch;\">A visual audit of the Hyper Light Drifter design system behind Socratic Co-Writer — its colour, type, spacing and component layer measured against its own stated rules, Nielsen's heuristics, WCAG 2.2 AA, and Norman's principles. Read as the companion to the code forensic audit: that one found the architecture sound; this one looks at what the eye actually meets.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"row between\" style=\"align-items:flex-end;\">\n      <div class=\"row gap-32\">\n        <div class=\"col\"><span class=\"kicker\">Verdict<\u002Fspan><span class=\"h3\" style=\"color:var(--hld-yellow); margin-top:6px;\">Needs polish<\u002Fspan><\u002Fdiv>\n        <div class=\"col\"><span class=\"kicker\">Debt type<\u002Fspan><span class=\"h3\" style=\"margin-top:6px;\">Under-enforced<\u002Fspan><\u002Fdiv>\n        <div class=\"col\"><span class=\"kicker\">Primary lens<\u002Fspan><span class=\"h3\" style=\"margin-top:6px;\">Noise · focus · ADHD<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"text-align:right;\">\n        <span class=\"kicker\">Audited<\u002Fspan>\n        <span class=\"mono sm\" style=\"color:var(--ink-mute2); margin-top:6px;\">26 JUN 2026 · 13 pages<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================================================= P1 · EXEC SUMMARY = -->\n  <section class=\"page\" id=\"p1\" data-screen-label=\"01 Executive summary\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Executive summary<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> the verdict, the numbers, the five things<\u002Fspan>\n      <span>Page 01 / 13<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"row gap-32\" style=\"margin-bottom:8px;\">\n      <div class=\"col grow gap-16\">\n        <div class=\"col gap-8\">\n          <span class=\"eyebrow\">Overall health<\u002Fspan>\n          <h2 class=\"h2\" style=\"max-width:24ch;\">A real design language, accreted past the point its own restraint is enforced.<\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"body\" style=\"max-width:60ch;\">This is <b>not<\u002Fb> the usual \"vibe-coded, never had a design language\" case. There is a deliberate token system — a near-30-value palette built as a <i>state vocabulary<\u002Fi>, a typographic scale with a stated 8px floor, a 2/4-based spacing grid, square-by-identity geometry, and four named primitives (<span class=\"mono cyan\">hld-lit<\u002Fspan>, <span class=\"mono cyan\">hld-pip<\u002Fspan>, <span class=\"mono\">bracketed<\u002Fspan>, <span class=\"mono\">scanline<\u002Fspan>). The drift is that the system <b>writes down rules it then doesn't hold<\u002Fb>: \"max one lit action per surface,\" \"glow = alive,\" \"scanline never on reading content,\" \"don't invent colours.\" Features accreted faster than those laws were enforced — so signal inflated back into noise.<\u002Fp>\n\n        <div class=\"panel panel--deep brk\" style=\"--br:var(--hld-yellow);\">\n          <span class=\"eyebrow eyebrow--mute\" style=\"color:var(--hld-yellow);\">Design-debt characterisation · Fowler quadrant<\u002Fspan>\n          <p class=\"body\" style=\"margin-top:8px; color:var(--ink-mute2);\">Overwhelmingly <b class=\"yel\">Deliberate &amp; Prudent<\u002Fb> — the language is documented and intentional — with a thin <b>Inadvertent<\u002Fb> sliver: accent inflation, off-grid type/spacing, and ambient-glow creep that slipped in feature-by-feature. The companion <span class=\"mono\">code<\u002Fspan> audit reached the same shape of verdict about the architecture. <b class=\"cyan\">The cure here is subtraction, not redesign.<\u002Fb><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"col\" style=\"width:300px; flex:none;\">\n        <div class=\"verdict\">\n          <div class=\"gauge\" style=\"--v:60;\">\n            <div class=\"g-in\"><div class=\"g-v\">B–<\u002Fdiv><div class=\"g-l\">Design health<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"col gap-8\">\n            <span class=\"kicker\">Where it sits<\u002Fspan>\n            <p class=\"sm\" style=\"color:var(--ink-mute2);\">Solid foundation, untidy surface. Fixable in weeks, not a rebuild.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"verdict-scale\">\n          <span class=\"vs\">Healthy<\u002Fspan>\n          <span class=\"vs on\">Needs polish<\u002Fspan>\n          <span class=\"vs\">Rethink<\u002Fspan>\n          <span class=\"vs\">Rebuild<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- key numbers -->\n    <div class=\"stats\" style=\"grid-template-columns:repeat(4,1fr); margin-bottom:8px;\">\n      <div class=\"stat is-over\">\n        <div class=\"k\">Colour values in use<\u002Fdiv>\n        <div class=\"v tnum\">29 <small>/ ~18 ideal<\u002Fsmall><\u002Fdiv>\n        <div class=\"h\"><b class=\"flag-over\">11 saturated accents<\u002Fb> · healthy ≈ 6<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat is-over\">\n        <div class=\"k\">Type sizes rendered<\u002Fdiv>\n        <div class=\"v tnum\">14 <small>/ 8 tokens<\u002Fsmall><\u002Fdiv>\n        <div class=\"h\"><b class=\"flag-over\">6 off-scale<\u002Fb> · below the 8px floor<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat is-over\">\n        <div class=\"k\">Spacing values in use<\u002Fdiv>\n        <div class=\"v tnum\">23 <small>/ 14 tokens<\u002Fsmall><\u002Fdiv>\n        <div class=\"h\"><b class=\"flag-over\">9 off-grid<\u002Fb> · healthy 8–12<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat is-over\">\n        <div class=\"k\">Ways to show status<\u002Fdiv>\n        <div class=\"v tnum\">6 <small>/ 1 intended<\u002Fsmall><\u002Fdiv>\n        <div class=\"h\"><b class=\"flag-over\">~20 diamonds<\u002Fb> on one screen<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- top 5 issues -->\n    <div class=\"col gap-12 grow\">\n      <div class=\"secrail\"><span class=\"pip\"><\u002Fspan><span class=\"l\">The five most impactful issues<\u002Fspan><\u002Fdiv>\n      <div class=\"row gap-12 grow\" style=\"align-items:stretch;\">\n\n        <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n          <div class=\"repro\" style=\"height:74px;\">\n            <div style=\"position:absolute; inset:0; padding:7px; display:flex; flex-wrap:wrap; gap:5px; align-content:flex-start;\">\n              <span class=\"dia c\"><\u002Fspan><span class=\"dia m\"><\u002Fspan><span class=\"dia g\"><\u002Fspan><span class=\"dia y\"><\u002Fspan><span class=\"dia c\"><\u002Fspan><span class=\"dia p\"><\u002Fspan><span class=\"dia m\"><\u002Fspan><span class=\"dia g\"><\u002Fspan><span class=\"dia y\"><\u002Fspan><span class=\"dia c\"><\u002Fspan><span class=\"dia m\"><\u002Fspan><span class=\"dia g\"><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"scan\" style=\"position:absolute; inset:0;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"sev sev-3\">Major<\u002Fspan>\n          <div class=\"h3\" style=\"font-size:13px;\">Ambient noise<\u002Fdiv>\n          <p class=\"sm\">Grid + two washes + scanlines + per-pip glow, all at rest — against its own \"glow = alive\" rule.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n          <div class=\"repro\" style=\"height:74px; display:grid; place-items:center;\">\n            <div style=\"display:flex; gap:9px;\">\n              <span class=\"dia m\" style=\"width:10px;height:10px;\"><\u002Fspan><span class=\"dia y\" style=\"width:10px;height:10px;\"><\u002Fspan><span class=\"dia c\" style=\"width:10px;height:10px;\"><\u002Fspan><span class=\"dia g\" style=\"width:10px;height:10px;\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"sev sev-3\">Major<\u002Fspan>\n          <div class=\"h3\" style=\"font-size:13px;\">Status overload<\u002Fdiv>\n          <p class=\"sm\">Six encoders for one job; a 4-diamond meter carries one ordinal value. Nothing rests.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n          <div class=\"repro\" style=\"height:74px; display:grid; place-items:center;\">\n            <div style=\"display:flex; flex-wrap:wrap; gap:4px; justify-content:center; max-width:120px;\">\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#00e8f5;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#00f0ff;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#ff1060;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#00e870;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#aa00ff;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#7c8bff;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#ffe600;outline:1px dashed #ff8800;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#e5ff00;outline:1px dashed #ff8800;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#ffcc00;outline:1px dashed #ff8800;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#ffb020;outline:1px dashed #ff8800;\"><\u002Fspan>\n              <span class=\"dot\" style=\"width:13px;height:13px;border-radius:50%;background:#ff8800;outline:1px dashed #ff8800;\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"sev sev-3\">Major<\u002Fspan>\n          <div class=\"h3\" style=\"font-size:13px;\">Accent inflation<\u002Fdiv>\n          <p class=\"sm\">11 neon accents — five near-identical warms (dashed), two cyans, a duplicate magenta.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n          <div class=\"repro\" style=\"height:74px; display:grid; place-items:center;\">\n            <div class=\"mono\" style=\"display:flex; gap:11px; font-size:15px; color:var(--ink-mute);\">\n              <span>⌖<\u002Fspan><span>⊞<\u002Fspan><span>◫<\u002Fspan><span>⎘<\u002Fspan><span>⟲<\u002Fspan><span>✦<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"sev sev-3\">Major<\u002Fspan>\n          <div class=\"h3\" style=\"font-size:13px;\">Recognition load<\u002Fdiv>\n          <p class=\"sm\">Eight icon-only glyph tools, no labels — recall over recognition. Hard for ADHD focus.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"panel grow col gap-8\" style=\"padding:14px;\">\n          <div class=\"repro\" style=\"height:74px; padding:9px; gap:5px; display:flex; flex-direction:column; justify-content:center;\">\n            <div style=\"font-family:var(--font-mono); font-size:9px; color:#6f8cab;\">muted on surface<\u002Fdiv>\n            <div style=\"font-family:var(--font-mono); font-size:9px; color:rgba(255,255,255,0.5);\">dimmed tile label<\u002Fdiv>\n            <div style=\"height:3px; background:var(--hld-magenta); width:60%; box-shadow:0 0 8px var(--hld-magenta);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"sev sev-3\">Major <span style=\"color:var(--hld-muted)\">·<\u002Fspan> <span class=\"mag\">4 in spots<\u002Fspan><\u002Fspan>\n          <div class=\"h3\" style=\"font-size:13px;\">Accessibility gaps<\u002Fdiv>\n          <p class=\"sm\">No heading outline; partial focus rings; 9px tracked caps; 28px targets; dimmed labels under 4.5:1.<\u002Fp>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"runfoot\">\n      <span>Socratic Co-Writer · Visual Design Audit<\u002Fspan>\n      <span>Reconstruction-based · verify against live build<\u002Fspan>\n      <span class=\"pageno\">01<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================== P2 · COLOUR ========= -->\n  <section class=\"page\" id=\"p2\" data-screen-label=\"02 Colour inventory\">\n    <div class=\"runhead\">\n      <span><span class=\"rh-sec\">Inventory · colour<\u002Fspan> <span class=\"rh-dot\">·<\u002Fspan> what is, by hue · by frequency · proposed<\u002Fspan>\n      <span>Page 02 / 13<\u002Fspan>\n "meta\"><span class=\"role\">ui-btn<\u002Fspan><br>10px · caps<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec bad\"><div class=\"samp mono\" style=\"font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:#6f8cab;\">Label · meta · eyebrow — three tokens, one size<\u002Fdiv><div class=\"meta\"><span class=\"role\">3× 9px<\u002Fspan><br>label=meta=eyebrow<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec bad\"><div class=\"samp mono\" style=\"font-size:8.5px; letter-spacing:0.1em; text-transform:uppercase; color:#8a9cad;\">Treemap tile label<\u002Fdiv><div class=\"meta\"><span class=\"role\">off-scale<\u002Fspan><br>8.5px<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec bad\"><div class=\"samp mono\" style=\"font-size:7.5px; letter-spacing:0.08em; text-transform:uppercase; color:#6f8cab;\">Tile word-count — below the floor<\u002Fdiv><div class=\"meta\"><span class=\"role\">⚠ &lt; 8px<\u002Fspan><br>7.5px<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- analysis + proposed -->\n      <div class=\"col gap-12\" style=\"flex:1;\">\n        <div class=\"panel panel--deep brk\" style=\"--br:var(--hld-orange); padding:14px;\">\n          <span class=\"eyebrow\" style=\"color:var(--hld-orange);\">Three drifts<\u002Fspan>\n          <ul style=\"margin:8px 0 0; padding-left:16px; color:var(--ink-mute2); font-size:12px; line-height:1.6;\">\n            <li><b>Headings escape the scale.<\u002Fb> All four prose headings are <span class=\"mono\">rem<\u002Fspan> values (16.8–33.6px) that exist nowhere in the px tokens — an parallel, unmanaged ladder.<\u002Fli>\n            <li><b>9px traffic jam.<\u002Fb> <span class=\"mono\">label<\u002Fspan>, <span class=\"mono\">meta<\u002Fspan> and <span class=\"mono\">eyebrow<\u002Fspan> are three tokens at the identical 9px — distinct names implying distinction that isn't there.<\u002Fli>\n            <li><b class=\"org\">Floor breached.<\u002Fb> Tile text renders at 7.5–8.5px, under the system's own stated 8px minimum. Tracked mono caps at that size is a real legibility &amp; ADHD-decode cost.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"secrail\"><span class=\"pip\" style=\"background:var(--hld-green);\"><\u002Fspan><span class=\"l\">Proposed scale — 7 semantic steps<\u002Fspan><\u002Fdiv>\n        <div class=\"panel col\" style=\"padding:0; border-color:rgba(0,232,112,0.25);\">\n          <div class=\"spec\" style=\"padding:7px 12px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:24px; font-weight:800; color:#c5d8e8;\">Heading-xl<\u002Fdiv><div class=\"meta\" style=\"padding-right:12px;\">32 / 800<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\" style=\"padding:7px 12px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:19px; font-weight:700; color:#c5d8e8;\">Heading-lg<\u002Fdiv><div class=\"meta\" style=\"padding-right:12px;\">24 / 700<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\" style=\"padding:7px 12px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:16px; font-weight:600; color:#c5d8e8;\">Heading-md<\u002Fdiv><div class=\"meta\" style=\"padding-right:12px;\">19 / 600<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\" style=\"padding:7px 12px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:14px; color:#c5d8e8;\">Body — reading content<\u002Fdiv><div class=\"meta\" style=\"padding-right:12px;\">14 / 1.7<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\" style=\"padding:7px 12px;\"><div class=\"samp\" style=\"font-family:var(--font-sans); font-size:12.5px; color:#8aa6c4;\">Body-sm — secondary<\u002Fdiv><div class=\"meta\" style=\"padding-right:12px;\">12.5<\u002Fdiv><\u002Fdiv>\n          <div class=\"spec\" style=\"padding:7px 12px;\"><div class=\"samp mono\" style=\"font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#c5d8e8;\">Label — chrome caps<\u002Fdiv><div class=\"meta\" style=\"padding-right
