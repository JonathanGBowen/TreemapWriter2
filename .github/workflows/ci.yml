# CI gate — realizes the STATUS.md "keep it honest" guardrail.
# Frontend (typecheck + vitest + build) and the Rust backend (cargo test) must
# both pass on every push and PR.
name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run coverage
      - run: npm run build

  rust:
    name: Rust backend (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Tauri's crate links against webkit2gtk/gtk on Linux, so the lib must
      # build before its tests run. Install the standard Tauri v2 system deps.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test
        working-directory: src-tauri
        run: cargo test
